const _ml=document.createElement('link');_ml.rel='manifest';_ml.href=URL.createObjectURL(new Blob([JSON.stringify(_m)],{type:'application/json'}));document.head.appendChild(_ml);

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#020b18;--bg2:#0d1b2e;--bg3:#1e293b;--border:#0e2740;--cyan:#22d3ee;--green:#34d399;--amber:#f59e0b;--red:#ef4444;--text:#f1f5f9;--muted:#64748b;--dim:#475569;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',"Hiragino Kaku Gothic ProN",sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);}
button,.chip{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;transition:opacity 0.15s,transform 0.1s;}
button:active,.chip:active{opacity:0.7;transform:scale(0.97);}
input,textarea{font-family:inherit;outline:none;-webkit-appearance:none;}
#danger-banner{background:linear-gradient(90deg,#450a0a,#7f1d1d);padding:10px 16px;display:none;align-items:center;gap:8px;font-size:12px;color:#fca5a5;font-weight:600;flex-shrink:0;}
#danger-banner.show{display:flex;animation:slideDown 0.3s ease;}
#header{padding:calc(var(--safe-top) + 14px) 20px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0a1a2e;flex-shrink:0;}
#header .title{font-size:11px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;font-weight:600;}
#header .sub{font-size:12px;color:var(--muted);margin-top:2px;}
#content{flex:1;overflow-y:auto;padding:16px 20px 90px;-webkit-overflow-scrolling:touch;}
/* FIX: single transform declaration - previous version had two transforms, second overrode first causing nav misalignment */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateZ(0);width:100%;max-width:430px;background:rgba(2,11,24,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #0a1a2e;display:grid;grid-template-columns:repeat(4,1fr);padding:8px 0 calc(var(--safe-bot)+10px);z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;opacity:0.4;transition:opacity 0.2s;}
.nav-btn.active{opacity:1;}
.nav-btn .nav-icon{font-size:22px;transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.nav-btn.active .nav-icon{transform:translateY(-2px) scale(1.12);}
.nav-btn .nav-label{font-size:10px;color:var(--muted);font-weight:600;}
.nav-btn.active .nav-label{color:var(--cyan);}
.card{background:var(--bg2);border-radius:18px;padding:18px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.col{display:flex;flex-direction:column;gap:16px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.label-sm{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.btn-cyan{background:linear-gradient(135deg,#0891b2,#0e7490);border-radius:14px;padding:14px 24px;color:white;font-weight:700;font-size:15px;display:block;width:100%;text-align:center;box-shadow:0 4px 12px rgba(8,145,178,0.3);}
.btn-sm{background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);border-radius:10px;padding:8px 14px;color:var(--cyan);font-size:12px;font-weight:600;}
.btn-gray{background:var(--bg3);border:1px solid #334155;border-radius:14px;padding:14px;color:var(--text);font-size:14px;font-weight:600;}
.btn-red{background:var(--bg3);border:1px solid #334155;border-radius:14px;padding:14px;color:var(--red);font-size:14px;font-weight:600;}
.inp{width:100%;background:var(--bg3);border:1px solid #334155;border-radius:12px;padding:14px;color:var(--text);font-size:15px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px;}
.week-cell-label{font-size:10px;color:var(--muted);text-align:center;margin-bottom:6px;font-weight:600;}
.week-cell{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid transparent;}
.week-cell.sober{background:var(--cyan);color:#020b18;font-weight:700;box-shadow:0 0 8px rgba(34,211,238,0.25);}
.week-cell.drank{background:var(--red);color:white;font-weight:700;}
.week-cell.today{border-color:var(--cyan);background:rgba(34,211,238,0.05);}
.week-cell.empty{background:rgba(30,41,59,0.5);}
.tab-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.section-desc{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:12px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid #334155;border-radius:20px;padding:8px 14px;color:var(--muted);font-size:13px;cursor:pointer;margin:0 6px 8px 0;font-weight:600;}
.chip.sel{background:rgba(34,211,238,0.15);border-color:var(--cyan);color:var(--cyan);}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeIn 0.2s ease-out;}
.sheet{background:#0a1628;border-radius:24px 24px 0 0;padding:24px 24px calc(var(--safe-bot)+24px);width:100%;max-width:430px;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp 0.35s cubic-bezier(0.16,1,0.3,1);}
::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="danger-banner"><span style="font-size:16px">⚠️</span><span>魔の時間帯 (18:00–19:30) — 財布を置いてから出発</span></div>
  <div id="header">
    <div><div class="title">WATABE · リカバリー記録</div><div class="sub">目標 週3日以内の飲酒</div></div>
    <button onclick="openModal('setup')" style="background:var(--bg3);border:1px solid #334155;border-radius:10px;padding:8px 12px;color:var(--text);font-size:16px;">⚙</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('home')"    id="nav-home">   <span class="nav-icon">🏠</span><span class="nav-label">今日</span></button>
    <button class="nav-btn"        onclick="switchTab('savings')" id="nav-savings"> <span class="nav-icon">💰</span><span class="nav-label">資産</span></button>
    <button class="nav-btn"        onclick="switchTab('tactics')" id="nav-tactics"> <span class="nav-icon">🧠</span><span class="nav-label">戦略</span></button>
    <button class="nav-btn"        onclick="switchTab('history')" id="nav-history"> <span class="nav-icon">📊</span><span class="nav-label">記録</span></button>
  </nav>
</div>
<div id="modal-container"></div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────
const WEEKLY_GOAL = 3;
const TRIGGERS = [
  {id:"wife_line",icon:"📱",label:"妻のLINE（迎え）",   plan:"「今から行くね」とだけ返信し、財布を置いてから出発する"},
  {id:"station",  icon:"🚃",label:"最寄り駅に着いた",   plan:"イヤホン装着→ポッドキャスト再生。食材はネットスーパーで帰宅後注文"},
  {id:"konbini",  icon:"🏪",label:"コンビニの前を通った",plan:"目的がなければ入らない。代わりに自販機で炭酸水"},
  {id:"content",  icon:"📺",label:"酒コンテンツを見た",  plan:"すぐ料理動画（スペアリブ）に切り替え。作る側のモードへ"},
  {id:"stress",   icon:"😤",label:"仕事のストレス",      plan:"帰宅前に5分ウォーキング。コルチゾールを消費する"},
  {id:"holiday",  icon:"🏠",label:"休日の昼〜夕方",     plan:"14時にノンアルドリンクを作る習慣を先に入れる"},
];
const MILESTONES = [
  {weeks:1, icon:"🌱",label:"1週間",desc:"節酒習慣のスタート"},
  {weeks:2, icon:"💧",label:"2週間",desc:"睡眠の質が改善し始める"},
  {weeks:4, icon:"⚡",label:"1ヶ月",desc:"仕事パフォーマンスが上がる"},
  {weeks:8, icon:"🏔️",label:"2ヶ月",desc:"肝機能が目に見えて改善"},
  {weeks:12,icon:"🌟",label:"3ヶ月",desc:"習慣が完全に書き換わる"},
  {weeks:26,icon:"👑",label:"半年", desc:"人生の質が根本から変わる"},
];
const REGRET_COSTS = [
  ["🤢","頭痛・だるさで午前中のパフォーマンスが約40%低下（Harvard調査）"],
  ["💸","1回の飲酒コストは酒代+翌日の生産性損失で実質2倍以上"],
  ["😴","深い睡眠（ノンレム睡眠）が失われ、翌朝の集中力が顕著に低下"],
  ["🧠","前頭前野の働きが最大30%低下し、さらに飲みたくなる悪循環を生む"],
  ["📈","週3日以上の飲酒は肝臓の脂肪蓄積を加速し、肝臓年齢が15歳老ける"],
  ["🫀","飲酒翌日は心拍数が平均8%上昇し、心臓への負担が増え続ける"],
  ["💊","アルコールは翌日の気力・やる気を根本から奪う睡眠破壊物質"],
  ["🧬","1回の飲酒で腸内善玉菌が最大24時間ダメージを受ける（腸脳相関）"],
  ["💧","利尿作用で脱水し、翌朝の肌・頭皮・目が劣化する"],
  ["⏰","飲酒後の睡眠は浅く、実質的な休息時間が約30%減少する"],
];

const TOMATO_STAGES = [
  {days:0, icon:"🫘",name:"種まき",desc:"まだ土の中。ここから体の修復が始まります。"},
  {days:3, icon:"🌱",name:"発芽",  desc:"アルコールが抜け、最初の回復の芽が出ました。"},
  {days:7, icon:"🌿",name:"双葉",  desc:"睡眠の質が改善し、根がしっかり張ってきました。"},
  {days:14,icon:"🪴",name:"本葉",  desc:"肝臓の修復が進み、葉が青々と茂ってきました。"},
  {days:30,icon:"🌼",name:"開花",  desc:"良い習慣が定着。花が咲き、もうすぐ実を結びます。"},
  {days:60,icon:"🍏",name:"緑の実",desc:"目に見える成果！体調の良さが完全に定着しています。"},
  {days:90,icon:"🍅",name:"完熟",  desc:"大収穫！節酒は完全にあなたの新しいライフスタイルです。"},
];

// ─── STATE ──────────────────────────────────────────────────
let state = {startDate:null, dailyCost:600, log:{}, urges:[], currentTab:"home", historyMonthOffset:0};

// ─── PERF: memoized goalWeeks ────────────────────────────────
let _gwCache = {v:0, h:""};
function goalWeeks() {
  const h = JSON.stringify(state.log);
  if (_gwCache.h === h) return _gwCache.v;
  let c = 0;
  for (let i = 0; i >= -52; i--) { const s = weekStats(getWeekDays(i)); if (s.drank <= WEEKLY_GOAL && (s.sober+s.drank) >= 3) c++; }
  _gwCache = {v:c, h};
  return c;
}

// ─── PERSISTENCE ────────────────────────────────────────────
function load() {
  try {
    const sd=localStorage.getItem("wb_start"); if(sd) state.startDate=new Date(sd);
    const dc=localStorage.getItem("wb_cost");  if(dc) state.dailyCost=Number(dc);
    const lg=localStorage.getItem("wb_log");   if(lg) state.log=JSON.parse(lg);
    const ur=localStorage.getItem("wb_urges"); if(ur) state.urges=JSON.parse(ur);
  } catch(e){}
}
function save() {
  try {
    if(state.startDate) localStorage.setItem("wb_start",state.startDate.toISOString());
    localStorage.setItem("wb_cost",String(state.dailyCost));
    localStorage.setItem("wb_log",JSON.stringify(state.log));
    localStorage.setItem("wb_urges",JSON.stringify(state.urges));
    _gwCache.h="";
  } catch(e){}
}

// ─── HELPERS ────────────────────────────────────────────────
const todayKey = () => new Date().toISOString().slice(0,10);
function getWeekDays(offset=0) {
  const days=[],now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+offset*7);
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d.toISOString().slice(0,10));}
  return days;
}
function weekStats(days) {
  return {drank:days.filter(d=>state.log[d]==="drank").length, sober:days.filter(d=>state.log[d]==="sober").length};
}
function totalStats() {
  const sober=Object.values(state.log).filter(v=>v==="sober").length;
  return {sober, saved:sober*state.dailyCost};
}
function calcStreak() {
  let streak=0, d=new Date();
  const ts=state.log[todayKey()];
  if(!ts) d.setDate(d.getDate()-1);
  else if(ts==="drank") return 0;
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    if(state.log[k]==="sober"){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function checkDangerZone() {
  const h=new Date().getHours()+new Date().getMinutes()/60;
  document.getElementById("danger-banner")?.classList.toggle("show",h>=18&&h<19.5);
}

// ─── ROUTING ────────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+tab).classList.add("active");
  document.getElementById("content").scrollTop=0;
  renderContent();
}
function renderContent() {
  const el=document.getElementById("content");
  const map={home:renderHome,savings:renderSavings,tactics:renderTactics,history:renderHistory};
  el.innerHTML=(map[state.currentTab]||renderHome)();
}

// ─── HOME TAB ───────────────────────────────────────────────
function renderHome() {
  if(!state.startDate) return `<div style="text-align:center;padding:80px 20px"><div style="font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(34,211,238,0.3))">🎯</div><h2 style="font-family:'Noto Serif JP',serif;font-size:24px;margin-bottom:16px;line-height:1.5">ワタベさん専用<br>リカバリー・トラッカー</h2><p style="color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:40px">開始日と1日あたりの酒代を設定して<br>脳をハックする節酒を始めましょう</p><button class="btn-cyan" onclick="openModal('setup')">今すぐセットアップ →</button></div>`;

  const thisWeek=getWeekDays(0);
  const {drank,sober:wSober}=weekStats(thisWeek);
  const {saved,sober:tSober}=totalStats();
  const remain=WEEKLY_GOAL-drank, overGoal=drank>WEEKLY_GOAL, atGoal=drank===WEEKLY_GOAL;
  const todayLogged=state.log[todayKey()], todayIdx=(new Date().getDay()+6)%7;
  const streak=calcStreak(), hour=new Date().getHours(), isMorning=(hour>=5&&hour<12);
  const committed=localStorage.getItem("wb_commit_"+todayKey())==="1";
  const dayNames=["月","火","水","木","金","土","日"];
  const ringColor=overGoal?"#ef4444":atGoal?"#f59e0b":"#22d3ee";

  let stage=TOMATO_STAGES[0],nextStage=TOMATO_STAGES[1];
  for(let i=TOMATO_STAGES.length-1;i>=0;i--){if(tSober>=TOMATO_STAGES[i].days){stage=TOMATO_STAGES[i];nextStage=TOMATO_STAGES[i+1]||null;break;}}
  const stagePct=nextStage?Math.min(100,((tSober-stage.days)/(nextStage.days-stage.days))*100):100;

  const weekCells=thisWeek.map((d,i)=>{
    const s=state.log[d],isToday=i===todayIdx;
    let cls="week-cell";
    if(s==="sober")cls+=" sober";else if(s==="drank")cls+=" drank";else if(isToday)cls+=" today";else cls+=" empty";
    return `<div><div class="week-cell-label" style="color:${isToday?"var(--cyan)":"var(--muted)"}">${dayNames[i]}</div><div class="${cls}">${s==="sober"?"○":s==="drank"?"×":""}</div></div>`;
  }).join("");

  const morningCard = (!todayLogged && isMorning && !committed) ? `<div class="card" style="border:1px solid rgba(34,211,238,0.45);background:linear-gradient(135deg,rgba(34,211,238,0.1),rgba(34,211,238,0.02))"><p style="font-size:11px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;font-weight:700;margin-bottom:10px">☀️ 朝のコミットメント</p><p style="font-size:15px;font-weight:700;margin-bottom:6px">今日、飲まないと宣言しますか？</p><p style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:16px">朝に宣言するだけで夕方の衝動が40%抑制されます（Gollwitzer研究）。意志力ではなく、脳の準備をします。</p><button class="btn-cyan" style="padding:14px;font-size:15px" onclick="morningCommit()">✊ 今日は飲まない！と宣言する</button></div>` : "";
  const todayCard=!todayLogged
    ?`<div class="card" style="border:1px solid ${committed?"rgba(245,158,11,0.4)":"rgba(34,211,238,0.3)"};background:linear-gradient(180deg,var(--bg2),${committed?"rgba(245,158,11,0.03)":"rgba(34,211,238,0.03)"})">${committed?`<p style="font-size:11px;color:var(--amber);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">✊ 今朝宣言済み — ミッション実行中</p>`:""}
<p style="font-size:14px;font-weight:700;color:${committed?"var(--amber)":"var(--cyan)"};margin-bottom:16px;text-align:center">今日のミッションはクリアしましたか？</p><div class="row2"><button class="btn-cyan" style="padding:16px;font-size:16px" onclick="logToday('sober')">✓ 禁酒達成！</button><button class="btn-red" style="padding:16px;font-size:14px" onclick="openModal('recovery')">飲んでしまった</button></div></div>`
    :`<div class="card" style="text-align:center;position:relative;background:${todayLogged==="sober"?"rgba(34,211,238,0.06)":"rgba(239,68,68,0.06)"};border:1px solid ${todayLogged==="sober"?"rgba(34,211,238,0.3)":"rgba(239,68,68,0.3)"}"><button onclick="undoToday()" style="position:absolute;top:14px;right:14px;font-size:12px;font-weight:600;color:var(--muted);background:var(--bg3);padding:6px 12px;border-radius:8px;border:1px solid var(--border)">↩ 取消</button><p style="font-size:32px;margin-bottom:8px;margin-top:8px">${todayLogged==="sober"?"✅":"📝"}</p><p style="color:${todayLogged==="sober"?"var(--cyan)":"var(--red)"};font-weight:700;font-size:16px">${todayLogged==="sober"?"休肝達成！素晴らしい選択です。":"データを記録しました。"}</p>${todayLogged==="drank"?`<p style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6">失敗ではありません。データが「戦略タブ」に追加されました。<br>明日はまた新しいスタートです。</p>`:""}</div>`;

  const dayIdx = Math.floor(Date.now()/86400000);
  const regretSlice = [0,1,2].map(i => REGRET_COSTS[(dayIdx+i)%REGRET_COSTS.length]);
  const regretItems = regretSlice.map(([e,t])=>`<div style="display:flex;gap:12px;margin-bottom:10px;align-items:flex-start"><span style="font-size:16px">${e}</span><p style="font-size:12px;color:#c084fc;line-height:1.6">${t}</p></div>`).join("");

  return `<div class="col">
    <div class="card" style="border:1px solid rgba(52,211,153,0.35);background:linear-gradient(180deg,var(--bg2),rgba(52,211,153,0.06))">

function renderHistory(){
  const {sober,saved}=totalStats(), gw=goalWeeks();
  const dayNames=["月","火","水","木","金","土","日"];
  const summaryCards=[["累計クリア",sober+"日","var(--cyan)"],["確保した資金","¥"+saved.toLocaleString(),"var(--green)"],["目標達成週",gw+"週","var(--amber)"]].map(([l,v,c])=>`<div class="card" style="text-align:center;padding:16px"><p style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">${l}</p><p style="font-size:22px;font-weight:700;color:${c}">${v}</p></div>`).join("");
  const mo=state.historyMonthOffset||0, now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth()-mo,1);
  const yr=target.getFullYear(), mn=target.getMonth();
  const label=yr+"年"+(mn+1)+"月";
  const dim=new Date(yr,mn+1,0).getDate(), fdow=(new Date(yr,mn,1).getDay()+6)%7;
  let mS=0,mD=0;
  for(let d=1;d<=dim;d++){const k=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");if(state.log[k]==="sober")mS++;else if(state.log[k]==="drank")mD++;}
  let cells="";
  for(let i=0;i<fdow;i++)cells+="<div></div>";
  for(let d=1;d<=dim;d++){const k=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");const s=state.log[k],isToday=k===todayKey();const bg=s==="sober"?"var(--cyan)":s==="drank"?"var(--red)":isToday?"rgba(34,211,238,0.15)":"rgba(30,41,59,0.5)";cells+=`<div onclick="toggleHistoryLog('${k}')" class="week-cell" style="cursor:pointer;background:${bg};border:${isToday?"2px solid var(--cyan)":"2px solid transparent"};color:${s?"white":"var(--text)"};">${d}</div>`;}
  const dayHdr=dayNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding-bottom:6px;font-weight:600">${d}</div>`).join("");
  const milestoneCards=MILESTONES.map(m=>{const done=gw>=m.weeks;return `<div class="card" style="text-align:center;opacity:${done?1:0.5};border:1px solid ${done?"rgba(34,211,238,0.4)":"var(--border)"};background:${done?"linear-gradient(180deg,var(--bg2),rgba(34,211,238,0.05))":"var(--bg2)"}"><div style="font-size:32px;filter:${done?"drop-shadow(0 0 10px rgba(34,211,238,0.4))":"grayscale(1)"};margin-bottom:8px">${m.icon}</div><p style="font-size:13px;font-weight:700;color:${done?"var(--cyan)":"var(--text)"}">${m.label}</p><p style="font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4">${m.desc}</p></div>`;}).join("");
  return `<div class="col"><h3 class="tab-title">📊 データ・実績</h3><div class="row3">${summaryCards}</div><h3 class="tab-title" style="margin-top:4px">📅 カレンダー</h3><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><button onclick="changeMonth(1)" style="padding:10px;background:var(--bg3);border-radius:10px;font-size:16px;color:${mo>=12?"transparent":"var(--text)"};pointer-events:${mo>=12?"none":"auto"}">◀</button><div style="text-align:center"><p style="font-size:16px;font-weight:700">${label}</p><p style="font-size:11px;color:var(--muted);margin-top:4px;font-weight:600"><span style="color:var(--cyan)">✓ ${mS}日</span> / <span style="color:var(--red)">× ${mD}日</span></p></div><button onclick="changeMonth(-1)" style="padding:10px;background:var(--bg3);border-radius:10px;font-size:16px;color:${mo<=0?"transparent":"var(--text)"};pointer-events:${mo<=0?"none":"auto"}">▶</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${dayHdr}${cells}</div><p style="font-size:11px;color:var(--dim);text-align:center;margin-top:14px;font-weight:600">💡 日付をタップして記録を修正 / スワイプで月移動</p></div><h3 class="tab-title" style="margin-top:4px">🏆 マイルストーン</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${milestoneCards}</div></div>`;
}

// ─── ACTIONS ────────────────────────────────────────────────
function logToday(type){state.log[todayKey()]=type;save();renderContent();}
function morningCommit(){
  localStorage.setItem("wb_commit_"+todayKey(),"1");
  renderContent();
}
function undoToday(){delete state.log[todayKey()];save();renderContent();}

// ─── MODALS ─────────────────────────────────────────────────
function openModal(type){
  const mc=document.getElementById("modal-container");
  if(type==="setup")mc.innerHTML=renderSetupModal();
  if(type==="urge"){urgeTimer=300;urgeRunning=false;urgeTrigger="";mc.innerHTML=renderUrgeModal();}
  if(type==="recovery")mc.innerHTML=renderRecoveryModal();
}
function closeModal(){
  const o=document.querySelector('.overlay');if(!o)return;
  o.style.animation="fadeIn 0.15s ease-out reverse forwards";
  const s=o.querySelector('.sheet');if(s)s.style.animation="slideUp 0.2s ease-in reverse forwards";
  setTimeout(()=>{document.getElementById("modal-container").innerHTML="";},180);
}

function renderSetupModal(){
  const cur=state.startDate?state.startDate.toISOString().slice(0,10):new Date().toISOString().slice(0,10);
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><h3 style="font-size:18px;font-weight:700;margin-bottom:20px">⚙ 設定・データ管理</h3><label style="font-size:13px;color:var(--muted);display:block;margin-bottom:8px;font-weight:600">開始日</label><input type="date" id="setup-date" class="inp" value="${cur}"><label style="font-size:13px;color:var(--muted);display:block;margin-top:20px;margin-bottom:8px;font-weight:600">1日あたりの酒代（円）</label><input type="number" id="setup-cost" class="inp" value="${state.dailyCost}"><div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border)"><p style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--cyan)">💾 データバックアップ</p><p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6">ブラウザ履歴消去に備え、定期的にコピーしてiPhoneの「メモ」に保存してください。</p><div class="row2" style="margin-bottom:12px"><button class="btn-sm" style="padding:12px;font-size:13px" onclick="exportDataToClipboard()">📋 コピー</button><button class="btn-sm" style="padding:12px;font-size:13px" onclick="importData()">📥 復元</button></div><textarea id="backup-text" class="inp" style="height:80px;font-size:11px;color:var(--dim);resize:none;line-height:1.4" placeholder="復元する時はここにコピーしたテキストを貼り付けて「復元」を押す"></textarea></div><div class="row2" style="margin-top:32px"><button class="btn-gray" onclick="closeModal()">閉じる</button><button class="btn-cyan" onclick="saveSetup()">保存</button></div></div></div>`;
}
function saveSetup(){const d=document.getElementById("setup-date").value;const c=Number(document.getElementById("setup-cost").value);if(!d||!c)return;state.startDate=new Date(d+"T00:00:00");state.dailyCost=c;save();closeModal();renderContent();}
function exportDataToClipboard(){
  const data={wb_start:localStorage.getItem("wb_start"),wb_cost:localStorage.getItem("wb_cost"),wb_log:localStorage.getItem("wb_log"),wb_urges:localStorage.getItem("wb_urges"),wb_saving_goals:localStorage.getItem("wb_saving_goals"),wb_savings_ai:localStorage.getItem("wb_savings_ai"),wb_custom_plans:localStorage.getItem("wb_custom_plans"),wb_hidden_triggers:localStorage.getItem("wb_hidden_triggers"),wb_icon_sel:localStorage.getItem("wb_icon_sel")};
  const jsonStr=JSON.stringify(data);
  const ta=document.getElementById("backup-text");if(ta)ta.value=jsonStr;
  if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(jsonStr).then(()=>alert("コピーしました！\niPhoneの「メモ」アプリに貼り付けて保存してください。")).catch(()=>{if(ta)ta.select();alert("テキストエリアの内容を手動でコピーしてください。");});}
  else{if(ta){ta.select();try{document.execCommand("copy");alert("コピーしました！");}catch(e){alert("テキストエリアの内容を手動でコピーしてください。");}}}
}
function importData(){
  const ta=document.getElementById("backup-text");const jsonStr=ta?.value?.trim();
  if(!jsonStr){alert("テキストエリアが空です。\n保存しておいたテキストを貼り付けてください。");return;}
  if(!confirm("現在のデータは上書きされます。よろしいですか？"))return;
  try{const data=JSON.parse(jsonStr);Object.entries(data).forEach(([k,v])=>{if(v)localStorage.setItem(k,v);});load();closeModal();renderContent();alert("データを復元しました！");}
  catch(err){alert("読み込みに失敗しました。\nテキストが完全にコピーできているか確認してください。");}
}

function renderRecoveryModal(){
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><h3 style="font-size:18px;font-weight:700;margin-bottom:10px">📝 リカバリー分析</h3><p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px">飲んでしまった経験を<strong style="color:var(--cyan)">「次回防ぐためのデータ」</strong>に変えましょう。入力内容は「戦略タブ」に自動追加されます。</p><label style="font-size:13px;color:var(--cyan);display:block;margin-bottom:8px;font-weight:700">Q. 今回の引き金（トリガー）は？</label><input type="text" id="rec-trigger" class="inp" placeholder="例：仕事で疲れて帰ってきた時" style="margin-bottom:20px"><label style="font-size:13px;color:var(--cyan);display:block;margin-bottom:8px;font-weight:700">Q. 次回同じ状況になったらどうしますか？</label><input type="text" id="rec-plan" class="inp" placeholder="例：コンビニに寄らずまっすぐ帰る" style="margin-bottom:32px"><button class="btn-cyan" style="padding:16px" onclick="saveRecovery()">データを記録して戦略に追加する</button><button onclick="closeModal()" style="display:block;width:100%;text-align:center;font-size:14px;font-weight:600;color:var(--dim);margin-top:20px;padding:10px">キャンセル</button></div></div>`;
}
function saveRecovery(){
  const trigger=document.getElementById("rec-trigger")?.value?.trim();
  const plan=document.getElementById("rec-plan")?.value?.trim();
  if(trigger&&plan){let plans=[];try{plans=JSON.parse(localStorage.getItem("wb_custom_plans")||"[]");}catch(e){}plans.push({trigger,plan});localStorage.setItem("wb_custom_plans",JSON.stringify(plans));}
  logToday("drank");closeModal();
}

// ─── URGE SURFING ────────────────────────────────────────────
let urgeTimer=300,urgeRunning=false,urgeTrigger="",urgeInterval=null;
function renderUrgeModal(){
  const R=54,circ=2*Math.PI*R,offset=circ-(((300-urgeTimer)/300)*circ);
  const phase=urgeTimer>225?["衝動の発生","これは生理的な波です。意志の弱さではありません。ただ観察しましょう。"]:urgeTimer>120?["ピークへ向かう","波が高くなっていますが、これが最大値です。やり過ごせます。"]:urgeTimer>30?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:["衝動が去っていく","よくやりました。あなたは波を乗りこなしました。"];
  const min=Math.floor(urgeTimer/60),sec=String(urgeTimer%60).padStart(2,"0");
  const chips=TRIGGERS.map(t=>`<span class="chip${urgeTrigger===t.id?" sel":""}" onclick="setUrgeTrigger('${t.id}')">${t.icon} ${t.label}</span>`).join("");
  const planBox=urgeTrigger?`<div style="background:rgba(245,158,11,0.1);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid rgba(245,158,11,0.3)"><p style="font-size:12px;color:var(--amber);margin-bottom:6px;font-weight:700">📌 今すぐ実行すること</p><p style="font-size:15px;color:var(--text);line-height:1.6;font-weight:700">${TRIGGERS.find(t=>t.id===urgeTrigger)?.plan}</p></div>`:"";
  const actions=(!urgeRunning&&urgeTimer===300)?`<button class="btn-cyan" style="padding:16px;font-size:16px" onclick="startUrgeTimer()">タイマーを開始する</button>`:`<div class="row2"><button class="btn-red" onclick="closeModal();openModal('recovery')">飲んでしまった</button><button class="btn-cyan" style="padding:16px" onclick="logUrge(true)">✓ 乗り越えた！</button></div>`;
  return `<div class="overlay"><div class="sheet"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h3 style="font-size:18px;font-weight:700">🌊 誘惑サーフィン</h3><button onclick="stopUrge()" style="font-size:24px;color:var(--muted);padding:4px">×</button></div><div style="background:rgba(30,41,59,0.5);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--text);line-height:1.7;font-weight:600">飲みたい衝動は<span style="color:var(--cyan)">5〜10分で必ず自然に消えます</span>（ACT理論）。抵抗せず、ただ波を観察してください。</div><p style="font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600">今のトリガーは？</p><div style="margin-bottom:20px">${chips}</div>${planBox}<div style="text-align:center;margin-bottom:24px"><svg width="140" height="140" viewBox="0 0 130 130" style="transform:rotate(-90deg)"><circle cx="65" cy="65" r="${R}" fill="none" stroke="var(--bg3)" stroke-width="10"/><circle id="urge-arc" cx="65" cy="65" r="${R}" fill="none" stroke="var(--cyan)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s linear"/></svg><div style="margin-top:-104px;position:relative"><p id="urge-time" style="font-family:'Noto Serif JP',serif;font-size:46px;font-weight:700;letter-spacing:-2px">${min}:${sec}</p></div><p id="urge-phase-title" style="color:var(--cyan);font-weight:700;margin-top:52px;font-size:16px">${phase[0]}</p><p id="urge-phase-desc" style="color:var(--muted);font-size:13px;margin-top:6px;line-height:1.6;font-weight:600">${phase[1]}</p></div><div id="urge-actions">${actions}</div></div></div>`;
}
function setUrgeTrigger(id){urgeTrigger=id;document.getElementById("modal-container").innerHTML=renderUrgeModal();if(urgeRunning)startUrgeTimer();}
function startUrgeTimer(){urgeRunning=true;clearInterval(urgeInterval);urgeInterval=setInterval(()=>{if(urgeTimer<=0){clearInterval(urgeInterval);urgeRunning=false;}else urgeTimer--;updateUrgeDisplay();},1000);updateUrgeDisplay();}
function updateUrgeDisplay(){
  const R=54,circ=2*Math.PI*R,offset=circ-(((300-urgeTimer)/300)*circ);
  const min=Math.floor(urgeTimer/60),sec=String(urgeTimer%60).padStart(2,"0");
  const phase=urgeTimer>225?["衝動の発生","これは生理的な波です。意志の弱さではありません。ただ観察しましょう。"]:urgeTimer>120?["ピークへ向かう","波が高くなっていますが、これが最大値です。やり過ごせます。"]:urgeTimer>30?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:["衝動が去っていく","よくやりました。あなたは波を乗りこなしました。"];
  const g=id=>document.getElementById(id);
  const arc=g("urge-arc");if(arc)arc.setAttribute("stroke-dashoffset",offset);
  if(g("urge-time"))g("urge-time").textContent=`${min}:${sec}`;
  if(g("urge-phase-title"))g("urge-phase-title").textContent=phase[0];
  if(g("urge-phase-desc"))g("urge-phase-desc").textContent=phase[1];
  if(!urgeRunning&&urgeTimer<=0){const a=g("urge-actions");if(a)a.innerHTML=`<div class="row2"><button class="btn-red" onclick="closeModal();openModal('recovery')">飲んでしまった</button><button class="btn-cyan" style="padding:16px" onclick="logUrge(true)">✓ 乗り越えた！</button></div>`;}
}
function logUrge(resisted){clearInterval(urgeInterval);state.urges=[{date:new Date().toISOString(),triggerId:urgeTrigger,resisted},...state.urges].slice(0,200);save();closeModal();renderContent();}
function stopUrge(){clearInterval(urgeInterval);closeModal();}

// ─── SWIPE on calendar ───────────────────────────────────────
let _sx=null;
document.addEventListener("touchstart",e=>{if(state.currentTab==="history")_sx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",e=>{if(state.currentTab!=="history"||_sx===null)return;const dx=e.changedTouches[0].clientX-_sx;_sx=null;if(Math.abs(dx)>60)changeMonth(dx<0?-1:1);},{passive:true});

// ─── VISIBILITY REFRESH ─────────────────────────────────────
let _lv=Date.now();
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"){const now=Date.now();if(now-_lv>60000){renderContent();checkDangerZone();}_lv=now;}});

// ─── INIT ────────────────────────────────────────────────────
load();renderContent();checkDangerZone();setInterval(checkDangerZone,60000);

// Service Worker
if('serviceWorker' in navigator){
  const sw=`const C='sw-v7',A=[self.location.href];self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
}
</script>
</body>
</html>
