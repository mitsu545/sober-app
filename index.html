<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="節酒">
<meta name="theme-color" content="#020b18">
<title>節酒トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<script>
const manifestData = {
  name: "ワタベ節酒トラッカー",
  short_name: "節酒",
  start_url: ".",
  display: "standalone",
  background_color: "#020b18",
  theme_color: "#020b18",
  orientation: "portrait",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23020b18'/><text x='96' y='130' font-size='100' text-anchor='middle'>🎯</text></svg>`),
    sizes: "192x192", type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<style>
/* Reset & Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #020b18; --bg2: #0d1b2e; --bg3: #1e293b; --border: #0e2740;
  --cyan: #22d3ee; --green: #34d399; --amber: #f59e0b; --red: #ef4444; --purple: #7c3aed;
  --text: #f1f5f9; --muted: #64748b; --dim: #475569;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', "Hiragino Kaku Gothic ProN", sans-serif; font-feature-settings: "palt"; overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100%; max-width: 430px; margin: 0 auto; background: var(--bg); position: relative; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; transition: transform 0.1s ease, opacity 0.2s; }
button:active { transform: scale(0.96); opacity: 0.8; }
input, textarea, select { font-family: inherit; outline: none; appearance: none; }
::-webkit-scrollbar { display: none; } 

/* Layout */
#danger-banner { background: linear-gradient(90deg,#450a0a,#7f1d1d); padding: 10px 16px; display: none; align-items: center; gap: 8px; font-size: 12px; color: #fca5a5; font-weight: 600; flex-shrink: 0; }
#danger-banner.show { display: flex; animation: slideDown 0.3s ease; }
#header { padding: calc(var(--safe-top) + 14px) 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0a1a2e; flex-shrink: 0; }
#header .title { font-size: 11px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; font-weight: 600; }
#header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
#content { flex: 1; overflow-y: auto; padding: 16px 20px 90px; -webkit-overflow-scrolling: touch; }
#nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(2,11,24,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #0a1a2e; display: grid; grid-template-columns: repeat(4,1fr); padding: 8px 0 calc(var(--safe-bot) + 10px); z-index: 100; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; opacity: 0.4; }
.nav-btn.active { opacity: 1; }
.nav-btn .nav-icon { font-size: 22px; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
.nav-btn.active .nav-icon { transform: translateY(-2px) scale(1.1); }
.nav-btn .nav-label { font-size: 10px; color: var(--muted); font-weight: 600; }
.nav-btn.active .nav-label { color: var(--cyan); }

/* Components */
.card { background: var(--bg2); border-radius: 18px; padding: 18px; border: 1px solid var(--border); margin-bottom: 0; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.col { display: flex; flex-direction: column; gap: 16px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.label-sm { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }

/* Buttons & Inputs */
.btn-cyan { background: linear-gradient(135deg,#0891b2,#0e7490); border-radius: 14px; padding: 14px 24px; color: white; font-weight: 700; font-size: 15px; display: block; width: 100%; text-align: center; box-shadow: 0 4px 12px rgba(8,145,178,0.3); }
.btn-sm { background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3); border-radius: 10px; padding: 8px 14px; color: var(--cyan); font-size: 12px; font-weight: 600; }
.btn-gray { background: var(--bg3); border: 1px solid #334155; border-radius: 14px; padding: 14px; color: var(--text); font-size: 14px; font-weight: 600; }
.btn-red { background: var(--bg3); border: 1px solid #334155; border-radius: 14px; padding: 14px; color: var(--red); font-size: 14px; font-weight: 600; }
.inp { width: 100%; background: var(--bg3); border: 1px solid #334155; border-radius: 12px; padding: 14px; color: var(--text); font-size: 15px; }

/* Week Grid */
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-top: 16px; }
.week-cell-label { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 6px; font-weight: 600; }
.week-cell { width: 100%; aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 2px solid transparent; transition: all 0.2s; }
.week-cell.sober { background: var(--cyan); color: #020b18; font-weight: 700; box-shadow: 0 0 10px rgba(34,211,238,0.2); }
.week-cell.drank { background: var(--red); color: white; font-weight: 700; }
.week-cell.today { border-color: var(--cyan); background: rgba(34,211,238,0.05); }
.week-cell.empty { background: rgba(30,41,59,0.5); }

/* Modal & Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 200; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); animation: fadeIn 0.2s ease-out; }
.sheet { background: #0a1628; border-radius: 24px 24px 0 0; padding: 24px 24px calc(var(--safe-bot) + 24px); width: 100%; max-width: 430px; border-top: 1px solid var(--border); max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }

/* Misc */
.tab-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.section-desc { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
.chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid #334155; border-radius: 20px; padding: 8px 14px; color: var(--muted); font-size: 13px; cursor: pointer; margin: 0 6px 8px 0; font-weight: 600; }
.chip.sel { background: rgba(34,211,238,0.15); border-color: var(--cyan); color: var(--cyan); }
</style>
</head>
<body>
<div id="app">
  <div id="danger-banner">
    <span style="font-size:16px;">⚠️</span>
    <span>魔の時間帯 (18:00–19:30) — 財布を置いてから出発しましょう</span>
  </div>

  <div id="header">
    <div>
      <div class="title">WATABE · リカバリー記録</div>
      <div class="sub">目標 週3日以内の飲酒</div>
    </div>
    <button onclick="openModal('setup')" style="background:var(--bg3);border:1px solid #334155;border-radius:10px;padding:8px 12px;color:var(--text);font-size:16px;">⚙</button>
  </div>

  <div id="content"></div>

  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="nav-home">
      <span class="nav-icon">🏠</span><span class="nav-label">今日</span>
    </button>
    <button class="nav-btn" onclick="switchTab('savings')" id="nav-savings">
      <span class="nav-icon">💰</span><span class="nav-label">資産</span>
    </button>
    <button class="nav-btn" onclick="switchTab('tactics')" id="nav-tactics">
      <span class="nav-icon">🧠</span><span class="nav-label">戦略</span>
    </button>
    <button class="nav-btn" onclick="switchTab('history')" id="nav-history">
      <span class="nav-icon">📊</span><span class="nav-label">記録</span>
    </button>
  </nav>
</div>

<div id="modal-container"></div>

<script>
// ─── DATA & CONSTANTS ───────────────────────────────────────
const WEEKLY_GOAL = 3;
const TRIGGERS = [
  { id:"wife_line", icon:"📱", label:"妻のLINE（迎え）",   plan:"「今から行くね」とだけ返信し、財布を置いてから出発する" },
  { id:"station",   icon:"🚃", label:"最寄り駅に着いた",   plan:"イヤホン装着→ポッドキャスト再生。食材はネットスーパーで帰宅後注文" },
  { id:"konbini",   icon:"🏪", label:"コンビニの前を通った", plan:"目的がなければ入らない。代わりに自販機で炭酸水" },
  { id:"content",   icon:"📺", label:"酒コンテンツを見た",  plan:"すぐ料理動画（スペアリブ）に切り替え。作る側のモードへ" },
  { id:"stress",    icon:"😤", label:"仕事のストレス",      plan:"帰宅前に5分ウォーキング。コルチゾールを消費する" },
  { id:"holiday",   icon:"🏠", label:"休日の昼〜夕方",     plan:"14時にノンアルドリンクを作る習慣を先に入れる" },
];

const MILESTONES = [
  { weeks:1,  icon:"🌱", label:"1週間", desc:"節酒習慣のスタート" },
  { weeks:2,  icon:"💧", label:"2週間", desc:"睡眠の質が改善し始める" },
  { weeks:4,  icon:"⚡", label:"1ヶ月", desc:"仕事パフォーマンスが上がる" },
  { weeks:8,  icon:"🏔️", label:"2ヶ月", desc:"肝機能が目に見えて改善" },
  { weeks:12, icon:"🌟", label:"3ヶ月", desc:"習慣が完全に書き換わる" },
  { weeks:26, icon:"👑", label:"半年",  desc:"人生の質が根本から変わる" },
];

const TOMATO_STAGES = [
  { days: 0,  icon: "🫘", name: "種まき", desc: "まだ土の中。ここから体の修復が始まります。" },
  { days: 3,  icon: "🌱", name: "発芽",   desc: "アルコールが抜け、最初の回復の芽が出ました。" },
  { days: 7,  icon: "🌿", name: "双葉",   desc: "睡眠の質が改善し、根がしっかり張ってきました。" },
  { days: 14, icon: "🪴", name: "本葉",   desc: "肝臓の修復が進み、葉が青々と茂ってきました。" },
  { days: 30, icon: "🌼", name: "開花",   desc: "良い習慣が定着。花が咲き、もうすぐ実を結びます。" },
  { days: 60, icon: "🍏", name: "緑の実", desc: "目に見える成果！体調の良さが完全に定着しています。" },
  { days: 90, icon: "🍅", name: "完熟",   desc: "大収穫！節酒は完全にあなたの新しいライフスタイルです。" }
];

// デフォルトの通知設定
const DEFAULT_NOTIFICATIONS = [
  { id: "n1", time: "18:00", title: "⚠️ 魔の時間帯スタート", body: "今日の帰宅ルート確認。財布は置いてから出発しましょう", active: true },
  { id: "n2", time: "19:00", title: "🌊 誘惑ピーク時間", body: "飲みたくなったらアプリの「誘惑サーフィン」を開いてください", active: true },
  { id: "n3", time: "19:15", title: "💪 もう少しで安全圏", body: "19:30を過ぎれば今日の魔の時間帯は終わりです", active: true },
  { id: "n0", time: "08:00", title: "☀️ 昨夜の選択を振り返ろう", body: "飲んでしまった翌朝：頭痛・だるさ・後悔。今夜また同じにならないために、今日の帰宅ルートを決めておこう", active: true }
];

// ─── STATE ──────────────────────────────────────────────────
let state = {
  startDate: null,
  dailyCost: 600,
  log: {},      
  urges: [],    
  currentTab: "home",
  historyMonthOffset: 0, 
  notifications: [],
  notifMutedDate: "" // "YYYY-MM-DD"形式。この日付の時は通知を鳴らさない
};

function load() {
  try {
    const sd = localStorage.getItem("wb_start");
    if (sd) state.startDate = new Date(sd);
    const dc = localStorage.getItem("wb_cost");
    if (dc) state.dailyCost = Number(dc);
    const lg = localStorage.getItem("wb_log");
    if (lg) state.log = JSON.parse(lg);
    const ur = localStorage.getItem("wb_urges");
    if (ur) state.urges = JSON.parse(ur);
    
    const nf = localStorage.getItem("wb_notif");
    if (nf) state.notifications = JSON.parse(nf);
    else state.notifications = JSON.parse(JSON.stringify(DEFAULT_NOTIFICATIONS));
    
    const nm = localStorage.getItem("wb_notif_muted");
    if (nm) state.notifMutedDate = nm;
  } catch(e) {}
}

function save() {
  try {
    if (state.startDate) localStorage.setItem("wb_start", state.startDate.toISOString());
    localStorage.setItem("wb_cost", String(state.dailyCost));
    localStorage.setItem("wb_log", JSON.stringify(state.log));
    localStorage.setItem("wb_urges", JSON.stringify(state.urges));
    localStorage.setItem("wb_notif", JSON.stringify(state.notifications));
    localStorage.setItem("wb_notif_muted", state.notifMutedDate);
  } catch(e) {}
}

// ─── HELPERS ────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }
function getWeekDays(offset=0) {
  const days=[], now=new Date(), mon=new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7) + offset*7);
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d.toISOString().slice(0,10));}
  return days;
}
function weekStats(days) {
  return {
    drank: days.filter(d=>state.log[d]==="drank").length,
    sober: days.filter(d=>state.log[d]==="sober").length,
  };
}
function totalStats() {
  const sober = Object.values(state.log).filter(v=>v==="sober").length;
  const drank = Object.values(state.log).filter(v=>v==="drank").length;
  const saved = sober * state.dailyCost;
  return { sober, drank, saved };
}
function goalWeeks() {
  let count=0;
  for(let i=0;i>=-52;i--){
    const days=getWeekDays(i);
    const s=weekStats(days);
    if(s.drank<=WEEKLY_GOAL && (s.sober+s.drank)>=3) count++;
  }
  return count;
}
function checkDangerZone() {
  const h=new Date().getHours()+new Date().getMinutes()/60;
  const banner=document.getElementById("danger-banner");
  if(banner) banner.classList.toggle("show", h>=18&&h<19.5);
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    renderContent();
    checkDangerZone();
  }
});

// ─── ROUTING ────────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+tab).classList.add("active");
  renderContent();
  window.scrollTo(0,0);
}

function renderContent() {
  const el = document.getElementById("content");
  if (state.currentTab==="home")    el.innerHTML = renderHome();
  if (state.currentTab==="savings") el.innerHTML = renderSavings();
  if (state.currentTab==="tactics") el.innerHTML = renderTactics();
  if (state.currentTab==="history") el.innerHTML = renderHistory();
}

// ─── HOME TAB ───────────────────────────────────────────────
function renderHome() {
  if (!state.startDate) return `
    <div style="text-align:center;padding:80px 20px">
      <div style="font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(34,211,238,0.3))">🎯</div>
      <h2 style="font-family:Noto Serif JP,serif;font-size:24px;margin-bottom:16px;line-height:1.5">ワタベさん専用<br>リカバリー・トラッカー</h2>
      <p style="color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:40px">開始日と1日あたりの酒代を設定して<br>脳をハックする節酒を始めましょう</p>
      <button class="btn-cyan" onclick="openModal('setup')">今すぐセットアップ →</button>
    </div>`;

  const thisWeek = getWeekDays(0);
  const { drank, sober } = weekStats(thisWeek);
  const remain = WEEKLY_GOAL - drank;
  const { saved, sober: totalSober } = totalStats();
  const overGoal = drank > WEEKLY_GOAL;
  const atGoal   = drank === WEEKLY_GOAL;
  const todayLogged = state.log[todayKey()];
  const todayIdx = (new Date().getDay()+6)%7;
  const dayNames = ["月","火","水","木","金","土","日"];

  let currentStage = TOMATO_STAGES[0], nextStage = TOMATO_STAGES[1];
  for (let i = TOMATO_STAGES.length - 1; i >= 0; i--) {
    if (totalSober >= TOMATO_STAGES[i].days) {
      currentStage = TOMATO_STAGES[i]; nextStage = TOMATO_STAGES[i+1] || null; break;
    }
  }
  const tomatoProgress = nextStage ? Math.min(100, ((totalSober - currentStage.days) / (nextStage.days - currentStage.days)) * 100) : 100;

  const tomatoCard = `
    <div class="card" style="border:1px solid rgba(52,211,153,0.4); background:linear-gradient(180deg, rgba(2,11,24,0) 0%, rgba(52,211,153,0.08) 100%);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <p class="label-sm" style="margin:0;color:var(--green)">🌿 体のリカバリー状況</p>
        <span style="font-size:12px;color:var(--muted);font-weight:600">累計休肝: <strong style="color:var(--text);font-size:14px;">${totalSober}日</strong></span>
      </div>
      <div style="display:flex;gap:18px;align-items:center;">
        <div style="font-size:52px;line-height:1;filter:drop-shadow(0 4px 12px rgba(52,211,153,0.3))">${currentStage.icon}</div>
        <div style="flex:1">
          <p style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text)">${currentStage.name}</p>
          <p style="font-size:12px;color:var(--muted);line-height:1.5">${currentStage.desc}</p>
        </div>
      </div>
      ${nextStage ? `
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:600">
          <span>次の進化（${nextStage.name}）まで</span>
          <span style="color:var(--green)">あと ${nextStage.days - totalSober}日</span>
        </div>
        <div style="background:rgba(30,41,59,0.8);border-radius:6px;height:6px;overflow:hidden;">
          <div style="height:100%;width:${tomatoProgress}%;background:linear-gradient(90deg, #10b981, #34d399);border-radius:6px;transition:width 1.2s cubic-bezier(0.22, 1, 0.36, 1)"></div>
        </div>
      </div>` : ''}
    </div>
  `;

  const ringColor = overGoal ? "#ef4444" : atGoal ? "#f59e0b" : "#22d3ee";
  const weekCells = thisWeek.map((d,i)=>{
    const s=state.log[d]; const isToday=i===todayIdx;
    let cls="week-cell";
    if(s==="sober") cls+=" sober"; else if(s==="drank") cls+=" drank"; else if(isToday) cls+=" today"; else cls+=" empty";
    return `<div><div class="week-cell-label" style="color:${isToday?"var(--cyan)":"var(--muted)"}">${dayNames[i]}</div><div class="${cls}">${s==="sober"?"○":s==="drank"?"×":""}</div></div>`;
  }).join("");

  const todayCard = !todayLogged
    ? `<div class="card" style="border:1px solid rgba(34,211,238,0.3); background:linear-gradient(180deg, var(--bg2) 0%, rgba(34,211,238,0.03) 100%);">
        <p style="font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:16px;text-align:center">今日のミッションはクリアしましたか？</p>
        <div class="row2">
          <button class="btn-cyan" style="padding:16px;font-size:16px;box-shadow:0 8px 20px rgba(8,145,178,0.4)" onclick="logToday('sober')">✓ 休肝達成</button>
          <button class="btn-red" style="background:var(--bg3);padding:16px;font-size:14px" onclick="openModal('recovery')">飲んでしまった</button>
        </div>
      </div>`
    : `<div class="card" style="text-align:center;background:${todayLogged==="sober"?"rgba(34,211,238,0.08)":"rgba(239,68,68,0.08)"};border:1px solid ${todayLogged==="sober"?"rgba(34,211,238,0.3)":"rgba(239,68,68,0.3)"}">
        <button onclick="undoToday()" style="position:absolute;top:14px;right:14px;font-size:12px;font-weight:600;color:var(--muted);background:var(--bg3);padding:6px 12px;border-radius:8px;border:1px solid var(--border)">↩️ 取消</button>

// ─── SAVINGS TAB ────────────────────────────────────────────

  let goals = [];

  const goalCards = goals.map((g,i) => {
    const pct = Math.min((saved / g.amount) * 100, 100);
    const daysLeft = Math.max(0, Math.ceil((g.amount - saved) / daily));
    return `<div class="card" style="border:1px solid rgba(34,211,238,0.2)">

      <p class="label-sm">節酒によって生み出した資金</p>
      <p style="font-family:Noto Serif JP,serif;font-size:52px;font-weight:700;color:var(--green);line-height:1;margin-top:8px;">¥${saved.toLocaleString()}</p>
      <div style="display:inline-block;background:rgba(255,255,255,0.05);padding:8px 16px;border-radius:14px;margin-top:14px;border:1px solid rgba(255,255,255,0.05)">
        <p style="font-size:13px;color:var(--muted);font-weight:600">休肝 <span style="color:var(--text);font-weight:700">${sober}</span> 日間 × <span style="color:var(--text);font-weight:700">¥${daily}</span> /日</p>

      <div style="border-top:1px dashed #1e3a5f; margin-top:24px; padding-top:20px;">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="background:var(--bg3);border-radius:12px;padding:14px">
            <p style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">1ヶ月の予測</p>

function selectIcon(el, e) {
  e.stopPropagation();
  localStorage.setItem("wb_icon_sel", el.getAttribute("data-ic"));
  renderContent();
}

function addGoal() {
  const name = document.getElementById("goal-name")?.value?.trim();
  const amount = Number(document.getElementById("goal-amount")?.value);
  const icon = localStorage.getItem("wb_icon_sel") || "✈️";
  if(!name || !amount) return;
  let goals = [];
  try { goals = JSON.parse(localStorage.getItem("wb_saving_goals")||"[]"); } catch(e){}
  goals.push({name, amount, icon});
  localStorage.setItem("wb_saving_goals", JSON.stringify(goals));
  renderContent();
}

function removeGoal(idx) {
  let goals = [];
  try { goals = JSON.parse(localStorage.getItem("wb_saving_goals")||"[]"); } catch(e){}
  goals.splice(idx,1);
  localStorage.setItem("wb_saving_goals", JSON.stringify(goals));
  renderContent();
}

      <button class="btn-sm" style="margin-top:14px;width:100%;padding:10px;font-size:13px" onclick="logUrgeFromTactics('${t.id}')">このトリガーへの勝利を記録</button>

    const bar = total > 0 ? `
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;color:var(--dim);font-weight:600">勝率</span>
          <span style="font-size:12px;color:${resisted/total>0.6?"var(--green)":"var(--amber)"};font-weight:700">${resisted}勝 / ${total}戦</span>
        </div>
        <div style="background:rgba(30,41,59,0.5);border-radius:4px;height:6px;overflow:hidden;"><div style="height:100%;width:${(resisted/total)*100}%;background:var(--green);border-radius:4px;transition:width 0.8s ease"></div></div>
      </div>` : "";
    return `<div class="card" style="border:1px solid rgba(245,158,11,0.3);background:linear-gradient(180deg, var(--bg2) 0%, rgba(245,158,11,0.03) 100%)">

        <div style="flex:1">
          <p style="font-weight:700;font-size:14px;color:var(--amber);margin-bottom:4px">もし「${p.trigger}」なら</p>

  return `<div class="col">

    <p class="section-desc">「もし〇〇になったら△△する」とあらかじめ決めておくことで、意志力を使わずに自動的に脳が防衛行動をとれます。</p>

function hideTrigger(id) {
  let hidden = [];
  try { hidden = JSON.parse(localStorage.getItem("wb_hidden_triggers")||"[]"); } catch(e){}
  hidden.push(id);
  localStorage.setItem("wb_hidden_triggers", JSON.stringify(hidden));
  renderContent();
}

function logUrgeFromCustom(idx) {
  const plans = JSON.parse(localStorage.getItem("wb_custom_plans")||"[]");
  const p = plans[idx];
  if(!p) return;
  const r = confirm(`「${p.trigger}」の誘惑を回避（クリア）しましたか？\nOK → クリア！　キャンセル → 飲んでしまった`);
  state.urges = [{date:new Date().toISOString(),triggerId:"custom_"+idx,resisted:r},...state.urges].slice(0,200);
  save();
  renderContent();
}

function addCustomPlan() {
  const trigger = document.getElementById("custom-trigger")?.value?.trim();
  const plan    = document.getElementById("custom-plan")?.value?.trim();
  if(!trigger || !plan) return;
  let plans = [];
  try { plans = JSON.parse(localStorage.getItem("wb_custom_plans")||"[]"); } catch(e){}
  plans.push({trigger, plan});
  localStorage.setItem("wb_custom_plans", JSON.stringify(plans));
  renderContent();
}

function removeCustomPlan(idx) {
  let plans = [];
  try { plans = JSON.parse(localStorage.getItem("wb_custom_plans")||"[]"); } catch(e){}
  plans.splice(idx, 1);
  localStorage.setItem("wb_custom_plans", JSON.stringify(plans));
  renderContent();
}

function logUrgeFromTactics(triggerId) {
  const r = confirm(`「${TRIGGERS.find(t=>t.id===triggerId).label}」の誘惑を回避（クリア）しましたか？\nOK → クリア！　キャンセル → 飲んでしまった`);
  state.urges = [{date:new Date().toISOString(),triggerId,resisted:r},...state.urges].slice(0,200);
  save();
  renderContent();
}

// ─── HISTORY TAB ────────────────────────────────────────────
function changeMonth(delta) {
  state.historyMonthOffset = Math.max(0, Math.min(12, (state.historyMonthOffset || 0) + delta));
  renderContent();
}

function toggleHistoryLog(dateStr) {
  const current = state.log[dateStr];
  if (!current) state.log[dateStr] = "sober"; // 空欄 -> クリア
  else if (current === "sober") state.log[dateStr] = "drank"; // クリア -> 飲酒
  else delete state.log[dateStr]; // 飲酒 -> 空欄(リセット)
  save();
  renderContent();
}

function renderHistory() {
  const {sober,saved}=totalStats();
  const gw=goalWeeks();
  const dayNames=["月","火","水","木","金","土","日"];

  const summaryCards = [
    ["累計クリア", sober+"日", "var(--cyan)"],
    ["確保した資金", "¥"+saved.toLocaleString(), "var(--green)"],
    ["目標達成週", gw+"週", "var(--amber)"],
  ].map(([l,v,c])=>`<div class="card" style="text-align:center;padding:16px"><p style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">${l}</p><p style="font-size:22px;font-weight:700;color:${c}">${v}</p></div>`).join("");

  const moOffset = state.historyMonthOffset || 0;
  const now = new Date();
  const targetDate = new Date(now.getFullYear(), now.getMonth() - moOffset, 1);
  const yr = targetDate.getFullYear(), mn = targetDate.getMonth();
  const label = `${yr}年${mn+1}月`;
  const daysInMonth = new Date(yr, mn+1, 0).getDate();
  const firstDow = (new Date(yr, mn, 1).getDay()+6)%7;
  
  let mSober=0, mDrank=0;
  for(let d=1;d<=daysInMonth;d++){
    const key = `${yr}-${String(mn+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    if(state.log[key]==="sober") mSober++;
    else if(state.log[key]==="drank") mDrank++;
  }
  
  let cells = "";
  for(let i=0;i<firstDow;i++) cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const key = `${yr}-${String(mn+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const s = state.log[key];
    const isToday = key === todayKey();
    const bg = s==="sober" ? "var(--cyan)" : s==="drank" ? "var(--red)" : isToday ? "rgba(34,211,238,0.15)" : "rgba(30,41,59,0.5)";
    const border = isToday ? "2px solid var(--cyan)" : "2px solid transparent";

function openModal(type) {
  const mc = document.getElementById("modal-container");
  if (type==="setup") mc.innerHTML = renderSetupModal();
  if (type==="urge")  { urgeTimer=300; urgeRunning=false; urgeTrigger=""; mc.innerHTML = renderUrgeModal(); }
  if (type==="recovery") mc.innerHTML = renderRecoveryModal();
  if (type==="notif") mc.innerHTML = renderNotifModal();
}

function closeModal() {
  const overlay = document.querySelector('.overlay');
  if(overlay) {
    overlay.style.animation = 'fadeIn 0.2s ease-out reverse forwards';
    const sheet = overlay.querySelector('.sheet');
    if(sheet) sheet.style.animation = 'slideUp 0.25s ease-in reverse forwards';
    setTimeout(() => { document.getElementById("modal-container").innerHTML=""; }, 200);
  }
}

  }

function exportDataToClipboard() {
  const data = {

    wb_log:    localStorage.getItem("wb_log"),
    wb_urges:  localStorage.getItem("wb_urges"),

  const textArea = document.getElementById("backup-text");
  if(textArea) textArea.value = jsonStr;
  
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(jsonStr).then(() => {
      alert("データをコピーしました！\nスマホの「メモ」等に貼り付けて保存してください。");

    if(textArea) textArea.select();
    try {
      document.execCommand('copy');
      alert("データをコピーしました！");
    } catch (err) {
      alert("手動でテキストをコピーしてください。");
    }
  }
}

function importDataFromClipboard() {

    return;

  if (!confirm("現在のデータは上書きされます。よろしいですか？")) return;

  try {
    const data = JSON.parse(jsonStr);
    Object.entries(data).forEach(([k,v])=>{ if(v) localStorage.setItem(k,v); });
    load(); 
    closeModal();
    renderContent();
    alert("データを無事に復元しました！");
  } catch(err) { 
    alert("読み込みに失敗しました。\nコピーしたテキストが欠けていないか確認してください。"); 
  }
}

// Urge Modal
let urgeTimer=300, urgeRunning=false, urgeTrigger="", urgeInterval=null;
function renderUrgeModal() {
  const R=54, circ=2*Math.PI*R;
  const pct=((300-urgeTimer)/300)*100;
  const offset=circ-(pct/100)*circ;
  const phase = urgeTimer>225?["衝動の発生","これは生理的な波です。あなたの意志の弱さではありません。ただ観察しましょう。"]:
                urgeTimer>120?["ピークへ向かう","波が高くなっていますが、これが最大値です。やり過ごせます。"]:
                urgeTimer>30 ?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:
                              ["衝動が去っていく","よくやりました。あなたは波を乗りこなしました。"];
  const min=Math.floor(urgeTimer/60), sec=String(urgeTimer%60).padStart(2,"0");

  const triggerChips = TRIGGERS.map(t=>`<span class="chip${urgeTrigger===t.id?" sel":""}" onclick="setUrgeTrigger('${t.id}')">${t.icon} ${t.label}</span>`).join("");
  const planBox = urgeTrigger
    ? `<div style="background:rgba(245,158,11,0.1);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid rgba(245,158,11,0.3)">
        <p style="font-size:12px;color:var(--amber);margin-bottom:6px;font-weight:700">📌 今すぐ実行すること</p>
        <p style="font-size:15px;color:var(--text);line-height:1.6;font-weight:700">${TRIGGERS.find(t=>t.id===urgeTrigger)?.plan}</p>
      </div>` : "";
  const actionBtns = (!urgeRunning && urgeTimer===300)
    ? `<button class="btn-cyan" style="padding:16px;font-size:16px;box-shadow:0 8px 20px rgba(8,145,178,0.4)" onclick="startUrgeTimer()">タイマーを開始する</button>`
    : `<div class="row2">
        <button class="btn-red" onclick="closeModal(); openModal('recovery');">飲んでしまった</button>
        <button class="btn-cyan" style="padding:16px" onclick="logUrge(true)">✓ 乗り越えた！</button>
      </div>`;
  return `<div class="overlay">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px">
        <h3 style="font-size:18px;font-weight:700">🌊 誘惑サーフィン</h3>
        <button onclick="stopUrge()" style="font-size:24px;color:var(--muted);padding:4px">×</button>
      </div>
      <div style="background:rgba(30,41,59,0.5);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--text);line-height:1.7;font-weight:600">
        飲みたい衝動は<span style="color:var(--cyan)">5〜10分で必ず自然に消えます</span>（ACT理論）。抵抗せず、ただ波を観察してください。
      </div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600">今のトリガー（引き金）は？</p>
      <div style="margin-bottom:20px">${triggerChips}</div>
      ${planBox}
      <div style="text-align:center;margin-bottom:24px">
        <svg id="urge-ring" width="140" height="140" viewBox="0 0 130 130" style="transform:rotate(-90deg)">
          <circle cx="65" cy="65" r="${R}" fill="none" stroke="var(--bg3)" stroke-width="10"/>
          <circle id="urge-arc" cx="65" cy="65" r="${R}" fill="none" stroke="var(--cyan)" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div style="margin-top:-104px;position:relative">
          <p id="urge-time" style="font-family:Noto Serif JP,serif;font-size:46px;font-weight:700;letter-spacing:-2px">${min}:${sec}</p>
        </div>
        <p id="urge-phase-title" style="color:var(--cyan);font-weight:700;margin-top:52px;font-size:16px">${phase[0]}</p>
        <p id="urge-phase-desc" style="color:var(--muted);font-size:13px;margin-top:6px;line-height:1.6;font-weight:600">${phase[1]}</p>
      </div>
      <div id="urge-actions">${actionBtns}</div>
    </div>
  </div>`;
}
function setUrgeTrigger(id) {
  urgeTrigger=id;
  document.getElementById("modal-container").innerHTML=renderUrgeModal();
  if(urgeRunning) startUrgeTimer();
}
function startUrgeTimer() {
  urgeRunning=true;
  clearInterval(urgeInterval);
  urgeInterval=setInterval(()=>{
    if(urgeTimer<=0){clearInterval(urgeInterval);urgeRunning=false;}
    else urgeTimer--;
    updateUrgeDisplay();
  },1000);
  updateUrgeDisplay();
}
function updateUrgeDisplay() {
  const R=54,circ=2*Math.PI*R;
  const pct=((300-urgeTimer)/300)*100;
  const offset=circ-(pct/100)*circ;
  const min=Math.floor(urgeTimer/60),sec=String(urgeTimer%60).padStart(2,"0");
  const phase=urgeTimer>225?["衝動の発生","これは生理的な波です。あなたの意志の弱さではありません。ただ観察しましょう。"]:
              urgeTimer>120?["ピークへ向かう","波が高くなっていますが、これが最大値です。やり過ごせます。"]:
              urgeTimer>30 ?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:
                            ["衝動が去っていく","よくやりました。あなたは波を乗りこなしました。"];
  const arc=document.getElementById("urge-arc");
  const time=document.getElementById("urge-time");
  const pt=document.getElementById("urge-phase-title");
  const pd=document.getElementById("urge-phase-desc");
  if(arc) arc.setAttribute("stroke-dashoffset",offset);
  if(time) time.textContent=`${min}:${sec}`;
  if(pt) pt.textContent=phase[0];
  if(pd) pd.textContent=phase[1];
  const actions=document.getElementById("urge-actions");
  if(actions && !urgeRunning && urgeTimer<=0) {
      actions.innerHTML=`<div class="row2">
        <button class="btn-red" onclick="closeModal(); openModal('recovery');">飲んでしまった</button>
        <button class="btn-cyan" style="padding:16px" onclick="logUrge(true)">✓ 乗り越えた！</button>
      </div>`;
  }
}
function logUrge(resisted) {
  clearInterval(urgeInterval);
  state.urges=[{date:new Date().toISOString(),triggerId:urgeTrigger,resisted},...state.urges].slice(0,200);
  save();
  closeModal();
  renderContent();
}
function stopUrge() {
  clearInterval(urgeInterval);
  closeModal();
}

let notifTimeouts = [];

async function setupNotif() {
  if(!("Notification" in window)) { alert("このブラウザは通知非対応です"); return; }
  const perm = await Notification.requestPermission();
  if(perm === "granted") {
    scheduleNotifications();
    renderContent();
    alert("通知を許可しました！\n設定から好きな時間とメッセージをカスタマイズしてください。");
  } else {
    alert("通知が許可されませんでした。\niPhoneの場合：設定 > Safari > 通知 で許可してください");
  }
}

function requestNotifPermission() {
  if(!("Notification" in window)) return;
  if(Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function scheduleNotifications() {
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  
  notifTimeouts.forEach(clearTimeout);
  notifTimeouts = [];

  if(state.notifMutedDate === todayKey()) return; 

  const now = new Date();

  state.notifications.forEach(n => {
    if(!n.active) return;
    const [h, m] = n.time.split(":").map(Number);
    const t = new Date(now);
    t.setHours(h, m, 0, 0);
    
    if (t <= now) t.setDate(t.getDate() + 1);

    const delay = t - now;
    if(delay > 0 && delay < 86400000) {
      const tid = setTimeout(() => {
        if(state.notifMutedDate === todayKey()) return; 
        new Notification(n.title, { body: n.body, icon: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🎯</text></svg>') });
      }, delay);
      notifTimeouts.push(tid);
    }
  });
}

// ─── INIT ───────────────────────────────────────────────────
load();
renderContent();
setInterval(checkDangerZone, 60000);
checkDangerZone();
requestNotifPermission();
scheduleNotifications();
setInterval(scheduleNotifications, 3600000);

if('serviceWorker' in navigator){
  const sw=`
    const CACHE='sober-v4';
    const ASSETS=[self.location.href];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
  `;
  const swBlob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}
</script>
