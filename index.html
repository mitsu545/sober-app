<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="節酒">
<meta name="theme-color" content="#020b18">
<title>節酒トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<script>
const manifestData = {
  name: "ワタベ節酒トラッカー",
  short_name: "節酒",
  start_url: ".",
  display: "standalone",
  background_color: "#020b18",
  theme_color: "#020b18",
  orientation: "portrait",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23020b18'/><text x='96' y='130' font-size='100' text-anchor='middle'>🎯</text></svg>`),
    sizes: "192x192", type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #020b18;
  --bg2: #0d1b2e;
  --bg3: #1e293b;
  --border: #0e2740;
  --cyan: #22d3ee;
  --green: #34d399;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #7c3aed;
  --text: #f1f5f9;
  --muted: #64748b;
  --dim: #475569;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100%; max-width: 430px; margin: 0 auto; background: var(--bg); }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; outline: none; }
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--border); }

/* Layout */
#danger-banner { background: linear-gradient(90deg,#450a0a,#7f1d1d); padding: 10px 16px; display: none; align-items: center; gap: 8px; font-size: 12px; color: #fca5a5; font-weight: 600; flex-shrink: 0; }
#danger-banner.show { display: flex; }
#header { padding: calc(var(--safe-top) + 14px) 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0a1a2e; flex-shrink: 0; }
#header .title { font-size: 11px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; }
#header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
#content { flex: 1; overflow-y: auto; padding: 16px 20px 90px; -webkit-overflow-scrolling: touch; }
#nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(2,11,24,0.96); backdrop-filter: blur(20px); border-top: 1px solid #0a1a2e; display: grid; grid-template-columns: repeat(4,1fr); padding: 8px 0 calc(var(--safe-bot) + 10px); z-index: 100; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px; opacity: 0.3; transition: opacity 0.2s; }
.nav-btn.active { opacity: 1; }
.nav-btn .nav-icon { font-size: 22px; }
.nav-btn .nav-label { font-size: 10px; color: var(--muted); }
.nav-btn.active .nav-label { color: var(--cyan); font-weight: 700; }

/* Cards */
.card { background: var(--bg2); border-radius: 16px; padding: 16px; border: 1px solid var(--border); margin-bottom: 0; }
.col { display: flex; flex-direction: column; gap: 14px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.label-sm { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }

/* Buttons */
.btn-cyan { background: linear-gradient(135deg,#0891b2,#0e7490); border-radius: 12px; padding: 12px 24px; color: white; font-weight: 700; font-size: 14px; display: block; width: 100%; text-align: center; }
.btn-sm { background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3); border-radius: 8px; padding: 5px 12px; color: var(--cyan); font-size: 11px; }
.btn-gray { background: var(--bg3); border: 1px solid #334155; border-radius: 12px; padding: 12px; color: var(--muted); font-size: 14px; }
.btn-red { background: var(--bg3); border: 1px solid #334155; border-radius: 12px; padding: 13px; color: var(--red); font-size: 13px; font-weight: 600; }

/* Input */
.inp { width: 100%; background: var(--bg3); border: 1px solid #334155; border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; }

/* Week grid */
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-top: 20px; }
.week-cell-label { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 4px; }
.week-cell { width: 100%; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 2px solid transparent; }
.week-cell.sober { background: var(--cyan); color: #020b18; font-weight: 700; }
.week-cell.drank { background: var(--red); color: white; font-weight: 700; }
.week-cell.today { border-color: var(--cyan); background: rgba(34,211,238,0.1); }
.week-cell.empty { background: var(--bg3); }

/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
.sheet { background: #0a1628; border-radius: 20px 20px 0 0; padding: 24px 24px calc(var(--safe-bot) + 24px); width: 100%; max-width: 430px; border: 1px solid var(--border); max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* Misc */
.tab-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; }
.section-desc { color: var(--muted); font-size: 13px; line-height: 1.7; }
.hidden { display: none !important; }
.chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid #334155; border-radius: 20px; padding: 5px 10px; color: var(--muted); font-size: 12px; cursor: pointer; margin: 3px; }
.chip.sel { background: rgba(34,211,238,0.1); border-color: var(--cyan); color: var(--cyan); }
</style>
</head>
<body>
<div id="app">
  <div id="danger-banner">
    <span>⚠️</span>
    <span>魔の時間帯 18:00–19:30 — 財布を置いてから出発しましょう</span>
  </div>

  <div id="header">
    <div>
      <div class="title">WATABE · 節酒記録</div>
      <div class="sub">目標 週3日以内の飲酒</div>
    </div>
    <button onclick="openModal('setup')" style="background:#0a1628;border:1px solid #0e2a44;border-radius:8px;padding:6px 12px;color:var(--muted);font-size:14px;">⚙</button>
  </div>

  <div id="content"></div>

  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="nav-home">
      <span class="nav-icon">🏠</span><span class="nav-label">今日</span>
    </button>
    <button class="nav-btn" onclick="switchTab('savings')" id="nav-savings">
      <span class="nav-icon">💰</span><span class="nav-label">貯金</span>
    </button>
    <button class="nav-btn" onclick="switchTab('tactics')" id="nav-tactics">
      <span class="nav-icon">🧠</span><span class="nav-label">対策</span>
    </button>
    <button class="nav-btn" onclick="switchTab('history')" id="nav-history">
      <span class="nav-icon">📊</span><span class="nav-label">記録</span>
    </button>
  </nav>
</div>

<div id="modal-container"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────
const WEEKLY_GOAL = 3;
const TRIGGERS = [
  { id:"wife_line", icon:"📱", label:"妻のLINE（迎え）",   plan:"「今から行くね」とだけ返信し、財布を置いてから出発する" },
  { id:"station",   icon:"🚃", label:"最寄り駅に着いた",   plan:"イヤホン装着→ポッドキャスト再生。食材はネットスーパーで帰宅後注文" },
  { id:"konbini",   icon:"🏪", label:"コンビニの前を通った", plan:"目的がなければ入らない。代わりに自販機で炭酸水" },
  { id:"content",   icon:"📺", label:"酒コンテンツを見た",  plan:"すぐ料理動画（スペアリブ）に切り替え。作る側のモードへ" },
  { id:"stress",    icon:"😤", label:"仕事のストレス",      plan:"帰宅前に5分ウォーキング。コルチゾールを消費する" },
  { id:"holiday",   icon:"🏠", label:"休日の昼〜夕方",     plan:"14時にノンアルドリンクを作る習慣を先に入れる" },
];
const RECIPES = [
  { id:"beer", icon:"🍺", name:"クラフトジンジャービア", for:"ビール代わりに", color:"#d97706",
    ing:["炭酸水 200ml","生姜スライス 3枚","レモン汁 大さじ1","はちみつ 小さじ2","塩ひとつまみ"],
    steps:["生姜を少し潰してグラスに入れる","レモン汁・はちみつ・塩を加え混ぜる","氷を入れて炭酸水を注ぐ","よく冷えたグラスで飲む"],
    science:"炭酸+苦み成分(生姜)がビールの口腔刺激を再現。脳の「飲んだ感」を満たします。" },
  { id:"wine", icon:"🍷", name:"スパイスグレープソーダ", for:"ワイン代わりに", color:"#7c3aed",
    ing:["ぶどうジュース（果汁100%）150ml","炭酸水 100ml","シナモンスティック 1本","クローブ 2粒","オレンジスライス 1枚"],
    steps:["グラスにシナモン・クローブを入れ30秒温める","ぶどうジュースを注ぎ軽く混ぜる","炭酸水をそっと加える","オレンジを飾り完成"],
    science:"ポリフェノール+スパイス香気がワインの複雑さを代替。視覚的演出が満足感を高めます。" },
  { id:"sake", icon:"🍶", name:"昆布だし甘酒ホット", for:"日本酒・焼酎代わりに", color:"#0e7490",
    ing:["甘酒（米麹）150ml","昆布だし 50ml","柚子皮 少々","塩ひとつまみ","お湯（温める用）"],
    steps:["甘酒と昆布だしを小鍋で温める（沸騰させない）","塩で味を整える","器に注ぎ柚子皮を散らす","香りをゆっくり楽しみながら飲む"],
    science:"甘酒のアミノ酸+うまみが日本酒の満足感を代替。温度刺激がリラックス効果を促します。" },
];
const MILESTONES = [
  { weeks:1,  icon:"🌱", label:"1週間", desc:"節酒習慣のスタート" },
  { weeks:2,  icon:"💧", label:"2週間", desc:"睡眠の質が改善し始める" },
  { weeks:4,  icon:"⚡", label:"1ヶ月", desc:"仕事パフォーマンスが上がる" },
  { weeks:8,  icon:"🏔️", label:"2ヶ月", desc:"肝機能が目に見えて改善" },
  { weeks:12, icon:"🌟", label:"3ヶ月", desc:"習慣が完全に書き換わる" },
  { weeks:26, icon:"👑", label:"半年",  desc:"人生の質が根本から変わる" },
];

// ─── STATE ──────────────────────────────────────────────────
let state = {
  startDate: null,
  dailyCost: 600,
  log: {},      // { "YYYY-MM-DD": "sober"|"drank" }
  urges: [],    // [{ date, triggerId, resisted }]
  currentTab: "home",
  aiMsg: "",
};

function load() {
  try {
    const sd = localStorage.getItem("wb_start");
    if (sd) state.startDate = new Date(sd);
    const dc = localStorage.getItem("wb_cost");
    if (dc) state.dailyCost = Number(dc);
    const lg = localStorage.getItem("wb_log");
    if (lg) state.log = JSON.parse(lg);
    const ur = localStorage.getItem("wb_urges");
    if (ur) state.urges = JSON.parse(ur);
  } catch(e) {}
}
function save() {
  try {
    if (state.startDate) localStorage.setItem("wb_start", state.startDate.toISOString());
    localStorage.setItem("wb_cost", String(state.dailyCost));
    localStorage.setItem("wb_log", JSON.stringify(state.log));
    localStorage.setItem("wb_urges", JSON.stringify(state.urges));
  } catch(e) {}
}

// ─── HELPERS ────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }
function getWeekDays(offset=0) {
  const days=[], now=new Date(), mon=new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7) + offset*7);
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d.toISOString().slice(0,10));}
  return days;
}
function weekStats(days) {
  return {
    drank: days.filter(d=>state.log[d]==="drank").length,
    sober: days.filter(d=>state.log[d]==="sober").length,
  };
}
function totalStats() {
  const sober = Object.values(state.log).filter(v=>v==="sober").length;
  const drank = Object.values(state.log).filter(v=>v==="drank").length;
  const saved = sober * state.dailyCost;
  return { sober, drank, saved };
}
function goalWeeks() {
  let count=0;
  for(let i=0;i>=-52;i--){
    const days=getWeekDays(i);
    const s=weekStats(days);
    if(s.drank<=WEEKLY_GOAL && (s.sober+s.drank)>=3) count++;
  }
  return count;
}
function checkDangerZone() {
  const h=new Date().getHours()+new Date().getMinutes()/60;
  const banner=document.getElementById("danger-banner");
  if(banner) banner.classList.toggle("show", h>=18&&h<19.5);
}

// ─── TABS ───────────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+tab).classList.add("active");
  renderContent();
}

function renderContent() {
  const el = document.getElementById("content");
  if (state.currentTab==="home")    el.innerHTML = renderHome();
  if (state.currentTab==="savings") el.innerHTML = renderSavings();
  if (state.currentTab==="tactics") el.innerHTML = renderTactics();
  if (state.currentTab==="history") el.innerHTML = renderHistory();
  bindEvents();
}

// ─── HOME TAB ───────────────────────────────────────────────
function renderHome() {
  if (!state.startDate) return `
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:72px;margin-bottom:16px">🎯</div>
      <h2 style="font-family:Noto Serif JP,serif;font-size:22px;margin-bottom:12px;line-height:1.5">ワタベさん専用<br>節酒トラッカー</h2>
      <p style="color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:28px">開始日と1日あたりの酒代を設定して<br>行動科学に基づいた節酒を始めましょう</p>
      <button class="btn-cyan" onclick="openModal('setup')">今すぐ始める →</button>
    </div>`;

  const thisWeek = getWeekDays(0);
  const { drank, sober } = weekStats(thisWeek);
  const remain = WEEKLY_GOAL - drank;
  const { saved } = totalStats();
  const soberDays = Object.values(state.log).filter(v=>v==="sober").length;
  const overGoal = drank > WEEKLY_GOAL;
  const atGoal   = drank === WEEKLY_GOAL;
  const todayLogged = state.log[todayKey()];
  const todayIdx = (new Date().getDay()+6)%7;
  const dayNames = ["月","火","水","木","金","土","日"];

  // ring
  const R=52, circ=2*Math.PI*R;
  const pct = Math.min((drank/WEEKLY_GOAL)*100, 100);
  const offset = circ - (pct/100)*circ;
  const ringColor = overGoal ? "#ef4444" : atGoal ? "#f59e0b" : "#22d3ee";

  const weekCells = thisWeek.map((d,i)=>{
    const s=state.log[d];
    const isToday=i===todayIdx;
    let cls="week-cell";
    if(s==="sober") cls+=" sober";
    else if(s==="drank") cls+=" drank";
    else if(isToday) cls+=" today";
    else cls+=" empty";
    return `<div><div class="week-cell-label" style="color:${isToday?"var(--cyan)":"var(--muted)"};font-weight:${isToday?700:400}">${dayNames[i]}</div><div class="${cls}">${s==="sober"?"○":s==="drank"?"×":""}</div></div>`;
  }).join("");

  const todayCard = !todayLogged
    ? `<div class="card">
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;text-align:center">今日はどうでしたか？</p>
        <div class="row2">
          <button class="btn-cyan" onclick="logToday('sober')">✓ 飲まなかった</button>
          <button class="btn-red" onclick="logToday('drank')">飲んでしまった</button>
        </div>
      </div>`
    : `<div class="card" style="text-align:center;background:${todayLogged==="sober"?"rgba(34,211,238,0.05)":"rgba(239,68,68,0.05)"};border:1px solid ${todayLogged==="sober"?"rgba(34,211,238,0.2)":"rgba(239,68,68,0.2)"}">
        <p style="font-size:28px;margin-bottom:4px">${todayLogged==="sober"?"✅":"😔"}</p>
        <p style="color:${todayLogged==="sober"?"var(--cyan)":"var(--red)"};font-weight:700">${todayLogged==="sober"?"今日は我慢できました！":"今日は飲んでしまいましたが、記録できています"}</p>
        ${todayLogged==="drank"?`<p style="font-size:12px;color:var(--muted);margin-top:6px">明日リセット。翌朝の後悔を覚えておこう。</p>`:""}
      </div>`;

  return `<div class="col">
    <div class="card" style="background:${overGoal?"linear-gradient(135deg,#450a0a,#1c0606)":"linear-gradient(135deg,#0c1a2e,#091526)"};border:1px solid ${overGoal?"#7f1d1d":"#0e3a5c"}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <p class="label-sm">今週の飲酒日数</p>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span style="font-family:Noto Serif JP,serif;font-size:52px;font-weight:700;color:${ringColor};line-height:1">${drank}</span>
            <span style="color:var(--dim);font-size:18px">/ ${WEEKLY_GOAL}日</span>
          </div>
          <p style="font-size:12px;color:${overGoal?"var(--red)":"var(--muted)"};margin-top:6px">
            ${overGoal?`⚠ 目標を${drank-WEEKLY_GOAL}日超過`:remain===0?"🎯 今週の目標達成！":`残り ${remain}日まで飲める`}
          </p>
        </div>
        <div style="text-align:right">
          <p style="font-size:11px;color:var(--dim);margin-bottom:4px">節約累計</p>
          <p style="font-size:24px;font-weight:700;color:var(--green)">¥${saved.toLocaleString()}</p>
          <p style="font-size:11px;color:var(--dim)">${soberDays}日我慢</p>
        </div>
      </div>
      <div class="week-grid">${weekCells}</div>
    </div>

    ${todayCard}

    <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:24px">🔔</span>
        <div>
          <p style="font-weight:600;font-size:14px">魔の時間帯に通知</p>
          <p style="font-size:11px;color:var(--muted);margin-top:2px">18:00 / 19:00 / 19:15 に予防アラート</p>
        </div>
      </div>
      <button class="btn-sm" onclick="setupNotif()" id="notif-btn">
        ${Notification && Notification.permission==='granted' ? '✓ ON' : '許可する'}
      </button>
    </div>

    <button onclick="openModal('urge')" class="card" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid rgba(34,211,238,0.15);cursor:pointer">
      <span style="font-size:28px">🌊</span>
      <div>
        <p style="font-weight:600;font-size:14px">飲みたくなったとき（今すぐ使う）</p>
        <p style="font-size:12px;color:var(--muted);margin-top:2px">タップで5分タイマー → 衝動は必ず去る</p>
      </div>
    </button>

    <div class="card" style="background:#0f0a1e;border:1px solid #1e1040">
      <p style="font-size:11px;letter-spacing:2px;color:#6b21a8;text-transform:uppercase;margin-bottom:12px">💭 翌朝の後悔コスト</p>
      <div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start"><span style="font-size:16px">🤢</span><p style="font-size:12px;color:#7c3aed;line-height:1.6">頭痛・だるさで午前中のパフォーマンスが約40%低下（Harvard Business Review調査）</p></div>
      <div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start"><span style="font-size:16px">💸</span><p style="font-size:12px;color:#7c3aed;line-height:1.6">1回の飲酒コストは酒代+翌日の生産性損失で実質2倍以上</p></div>

async function getSavingsAI() {
  // 省略せずそのまま（APIキーが必要な部分はモックのままと想定）

  const prompt = "ユーザーは週3日に節酒中。1日酒代" + daily + "円。節酒で年間¥" + yearly.toLocaleString() + "の節約見込み。設定目標：" + goalText + "。web_searchで「NISA 複利 節約」を検索し、①節約額の根拠と医療費削減効果、②目標への到達時期、③NISAに回した場合の10年後試算を200文字以内でまとめて。";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:1000,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user", content: prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text || "";
    if(text) {

    const fallback = "年間¥"+yearly.toLocaleString()+"の節約をNISA成長投資枠に回すと、年利5%で10年後に約¥"+Math.round(yearly*12.578).toLocaleString()+"に成長します（複利計算）。飲酒による医療費・生産性損失を含めると実質節約効果は1.5〜2倍と試算されます。";
    localStorage.setItem("wb_savings_ai", fallback);
    const el = document.getElementById("savings-ai-msg");
    if(el) el.innerHTML = '<p style="font-size:13px;color:#cbd5e1;line-height:1.8">'+fallback+'</p>';
  }
  if(btn){btn.textContent="更新";btn.disabled=false;}

// ── データバックアップ（改善版: クリップボード方式） ───────────────────────────────────
function exportDataToClipboard() {
  const data = {
    wb_start:  localStorage.getItem("wb_start"),
    wb_cost:   localStorage.getItem("wb_cost"),
    wb_log:    localStorage.getItem("wb_log"),
    wb_urges:  localStorage.getItem("wb_urges"),
    wb_saving_goals: localStorage.getItem("wb_saving_goals"),
    wb_custom_plans: localStorage.getItem("wb_custom_plans"),
    wb_hidden_triggers: localStorage.getItem("wb_hidden_triggers"),
  };
  const jsonStr = JSON.stringify(data);
  const textArea = document.getElementById("backup-text");
  textArea.value = jsonStr;
  
  if (navigator.clipboard && window.isSecureContext) {
    // HTTPS環境などでClipboard APIが使える場合
    navigator.clipboard.writeText(jsonStr).then(() => {
      alert("データをコピーしました！\nスマホの「メモ」や「LINEのKeep」などに貼り付けて保存してください。");
    }).catch(err => {
      // 失敗した場合はテキストエリアを選択して手動コピーを促す
      textArea.select();
      alert("自動コピーに失敗しました。\nテキストエリア内の文字をすべて選択して「コピー」し、メモ帳に保存してください。");
    });
  } else {
    // 古いブラウザや非HTTPS環境の場合
    textArea.select();
    try {
      document.execCommand('copy');
      alert("データをコピーしました！\nスマホの「メモ」や「LINEのKeep」などに貼り付けて保存してください。");
    } catch (err) {
      alert("テキストエリア内の文字をすべて選択して「コピー」し、メモ帳に保存してください。");
    }
  }
}

function importDataFromClipboard() {
  const textArea = document.getElementById("backup-text");
  const jsonStr = textArea.value.trim();
  
  if (!jsonStr) {
    alert("テキストエリアが空です。\n保存しておいたバックアップ用テキストを貼り付けてから、再度「復元する」を押してください。");
    return;
  }
  
  if (!confirm("現在のデータは上書きされます。よろしいですか？")) {
    return;
  }

  try {
    const data = JSON.parse(jsonStr);
    Object.entries(data).forEach(([k,v])=>{ if(v) localStorage.setItem(k,v); });
    load(); 
    renderContent();
    alert("データを無事に復元しました！");
    textArea.value = ""; // 成功したらテキストエリアを空にする
  } catch(err) { 
    alert("データの読み込みに失敗しました。\nコピーしたテキストが一部欠けていないか確認してください。"); 
  }
}

    else if(isToday)cls+=" today";
    else cls+=" empty";
    return '<div><div class="week-cell-label" style="color:'+(isToday?"var(--cyan)":"var(--muted)")+'">'+dayNames[i]+'</div><div class="'+cls+'" style="border-radius:6px;font-size:10px">'+(s==="sober"?"○":s==="drank"?"×":"")+'</div></div>';
  }).join("");
  const thisWeekCard = '<div class="card" style="border:1px solid '+(twOk?"rgba(34,211,238,0.3)":"rgba(239,68,68,0.3)")+'">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:12px">'
    +'<p style="font-size:14px;font-weight:700;color:var(--cyan)">今週</p>'
    +'<span style="font-size:12px;color:'+(twOk?"var(--cyan)":"var(--red)")+';font-weight:700">'+(twOk?"✓ 目標達成中":"× "+tw.drank+"/"+WEEKLY_GOAL+"日")+'</span></div>'
    +'<div class="week-grid" style="gap:4px">'+twCells+'</div>'
    +'<div style="display:flex;gap:16px;margin-top:10px">'
    +'<p style="font-size:12px;color:var(--cyan)">✓ '+tw.sober+'日</p>'
    +'<p style="font-size:12px;color:var(--red)">× '+tw.drank+'日</p>'
    +'<p style="font-size:12px;color:var(--muted)">残り '+(WEEKLY_GOAL-tw.drank)+'日まで可</p>'
    +'</div></div>';

  // 6ヶ月カレンダー
  const now = new Date();
  let monthHTML = "";
  for(let mo=0; mo<=5; mo++){
    const date = new Date(now.getFullYear(), now.getMonth()-mo, 1);
    const yr = date.getFullYear(), mn = date.getMonth();
    const label = yr+"年"+(mn+1)+"月";
    const daysInMonth = new Date(yr, mn+1, 0).getDate();
    const firstDow = (new Date(yr, mn, 1).getDay()+6)%7;
    let mSober=0, mDrank=0;
    for(let d=1;d<=daysInMonth;d++){
      const key=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      if(state.log[key]==="sober") mSober++;
      else if(state.log[key]==="drank") mDrank++;
    }
    let cells = "";
    for(let i=0;i<firstDow;i++) cells+='<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const key=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      const s=state.log[key];
      const isToday = key===new Date().toISOString().slice(0,10);
      const bg = s==="sober"?"var(--cyan)":s==="drank"?"var(--red)":isToday?"rgba(34,211,238,0.2)":"var(--bg3)";
      const border = isToday?"2px solid var(--cyan)":"2px solid transparent";
      cells+='<div style="aspect-ratio:1;border-radius:4px;background:'+bg+';border:'+border+';display:flex;align-items:center;justify-content:center;font-size:9px;color:'+(s?"white":"var(--muted)")+'">'+d+'</div>';
    }
    const dayHdr = dayNames.map(d=>'<div style="text-align:center;font-size:9px;color:var(--muted);padding-bottom:2px">'+d+'</div>').join("");
    monthHTML += '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<p style="font-size:13px;font-weight:700">'+label+'</p>'
      +'<div style="display:flex;gap:10px">'
      +'<span style="font-size:11px;color:var(--cyan)">✓ '+mSober+'日</span>'
      +'<span style="font-size:11px;color:var(--red)">× '+mDrank+'日</span>'
      +'</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">'+dayHdr+cells+'</div>'
      +'</div>';
  }

  // サマリー
  const summaryCards = [
    ["我慢日数", sober+"日", "var(--cyan)"],
    ["節約合計", "¥"+saved.toLocaleString(), "var(--green)"],
    ["目標達成週", gw+"週", "var(--amber)"],
  ].map(([l,v,c])=>'<div class="card" style="text-align:center;padding:12px"><p style="font-size:10px;color:var(--muted);margin-bottom:4px">'+l+'</p><p style="font-size:20px;font-weight:700;color:'+c+'">'+v+'</p></div>').join("");

  // マイルストーン
  const milestoneCards = MILESTONES.map(m=>{
    const done=gw>=m.weeks;
    return '<div class="card" style="text-align:center;opacity:'+(done?1:0.4)+';border:1px solid '+(done?"rgba(34,211,238,0.25)":"var(--border)")+'">'
      +'<div style="font-size:28px;filter:'+(done?"none":"grayscale(1)")+';margin-bottom:4px">'+m.icon+'</div>'
      +'<p style="font-size:12px;font-weight:700;color:'+(done?"var(--cyan)":"var(--muted)")+'">'+m.label+'</p>'
      +'<p style="font-size:10px;color:var(--muted);margin-top:2px">'+m.desc+'</p>'
      +'</div>';
  }).join("");

  return '<div class="col">'
    +'<h3 class="tab-title">📊 記録・統計</h3>'
    +'<div class="row3">'+summaryCards+'</div>'
    +thisWeekCard
    +'<h3 class="tab-title" style="margin-top:4px">📅 6ヶ月カレンダー</h3>'
    +monthHTML
    +'<h3 class="tab-title" style="margin-top:4px">🏆 マイルストーン</h3>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+milestoneCards+'</div>'
    +'</div>';
}

// ─── ACTIONS ────────────────────────────────────────────────
function logToday(type) {
  state.log[todayKey()] = type;
  save();
  renderContent();
}

// ─── MODALS ─────────────────────────────────────────────────
function openModal(type) {
  const mc = document.getElementById("modal-container");
  if (type==="setup") mc.innerHTML = renderSetupModal();
  if (type==="urge")  { urgeTimer=300; urgeRunning=false; urgeTrigger=""; mc.innerHTML = renderUrgeModal(); }
}
function closeModal() {
  document.getElementById("modal-container").innerHTML="";
}

// Setup Modal
function renderSetupModal() {
  const cur = state.startDate ? state.startDate.toISOString().slice(0,10) : new Date().toISOString().slice(0,10);
  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <h3 style="font-size:17px;font-weight:700;margin-bottom:18px">⚙ 設定</h3>
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">開始日</label>
      <input type="date" id="setup-date" class="inp" value="${cur}">
      <label style="font-size:12px;color:var(--muted);display:block;margin-top:14px;margin-bottom:6px">1日あたりの酒代（円）</label>
      <input type="number" id="setup-cost" class="inp" value="${state.dailyCost}">
      <div class="row2" style="margin-top:20px">
        <button class="btn-gray" onclick="closeModal()">閉じる</button>
        <button class="btn-cyan" onclick="saveSetup()">保存</button>
      </div>
    </div>
  </div>`;
}
function saveSetup() {
  const d = document.getElementById("setup-date").value;
  const c = Number(document.getElementById("setup-cost").value);
  state.startDate = new Date(d+"T00:00:00");
  state.dailyCost = c;
  save();
  closeModal();
  renderContent();
}

// Urge Modal
let urgeTimer=300, urgeRunning=false, urgeTrigger="", urgeInterval=null;
function renderUrgeModal() {
  const R=54, circ=2*Math.PI*R;
  const pct=((300-urgeTimer)/300)*100;
  const offset=circ-(pct/100)*circ;
  const phase = urgeTimer>225?["衝動の発生","これは生理反応。あなたの意志の問題ではありません。観察しましょう。"]:
                urgeTimer>120?["ピークへ向かう","強くなっていますが、これが最大値です。波を眺めていてください。"]:
                urgeTimer>30 ?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:
                              ["衝動が去っていく","よくやりました。あなたは波に乗り切りました。"];
  const min=Math.floor(urgeTimer/60), sec=String(urgeTimer%60).padStart(2,"0");

  const triggerChips = TRIGGERS.map(t=>`<span class="chip${urgeTrigger===t.id?" sel":""}" onclick="setUrgeTrigger('${t.id}')">${t.icon} ${t.label}</span>`).join("");
  const planBox = urgeTrigger
    ? `<div style="background:#0f1e3a;border-radius:10px;padding:12px;margin-bottom:16px;border-left:3px solid var(--amber)">
        <p style="font-size:11px;color:var(--amber);margin-bottom:4px">今すぐやること</p>
        <p style="font-size:13px;color:#cbd5e1;line-height:1.6">${TRIGGERS.find(t=>t.id===urgeTrigger)?.plan}</p>
      </div>` : "";
  const actionBtns = (!urgeRunning && urgeTimer===300)
    ? `<button class="btn-cyan" style="padding:14px;font-size:15px;margin-bottom:10px" onclick="startUrgeTimer()">タイマー開始</button>`
    : `<div class="row2">
        <button class="btn-red" onclick="logUrge(false)">飲んでしまった</button>
        <button class="btn-cyan" style="padding:13px" onclick="logUrge(true)">✓ 乗り越えた！</button>
      </div>`;
  return `<div class="overlay">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-size:17px;font-weight:700">🌊 誘惑サーフィン</h3>
        <button onclick="stopUrge()" style="font-size:22px;color:var(--muted)">×</button>
      </div>
      <div style="background:#0f1e3a;border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--muted);line-height:1.7">
        飲みたい衝動は<strong style="color:var(--cyan)">5〜10分で自然に消えます</strong>（ACT理論）。抵抗せず、ただ観察してください。
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px">トリガーは？</p>
      <div style="margin-bottom:16px">${triggerChips}</div>
      ${planBox}
      <div style="text-align:center;margin-bottom:16px">
        <svg id="urge-ring" width="130" height="130" viewBox="0 0 130 130" style="transform:rotate(-90deg)">
          <circle cx="65" cy="65" r="${R}" fill="none" stroke="var(--bg3)" stroke-width="9"/>
          <circle id="urge-arc" cx="65" cy="65" r="${R}" fill="none" stroke="var(--cyan)" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div style="margin-top:-98px;position:relative">
          <p id="urge-time" style="font-family:Noto Serif JP,serif;font-size:42px;font-weight:700">${min}:${sec}</p>
        </div>
        <p id="urge-phase-title" style="color:var(--cyan);font-weight:700;margin-top:44px">${phase[0]}</p>
        <p id="urge-phase-desc" style="color:var(--muted);font-size:12px;margin-top:4px;line-height:1.6">${phase[1]}</p>
      </div>
      <div id="urge-actions">${actionBtns}</div>
    </div>
  </div>`;
}
function setUrgeTrigger(id) {
  urgeTrigger=id;
  document.getElementById("modal-container").innerHTML=renderUrgeModal();
  if(urgeRunning) startUrgeTimer();
}
function startUrgeTimer() {
  urgeRunning=true;
  clearInterval(urgeInterval);
  urgeInterval=setInterval(()=>{
    if(urgeTimer<=0){clearInterval(urgeInterval);urgeRunning=false;}
    else urgeTimer--;
    updateUrgeDisplay();
  },1000);
  updateUrgeDisplay();
}
function updateUrgeDisplay() {
  const R=54,circ=2*Math.PI*R;
  const pct=((300-urgeTimer)/300)*100;
  const offset=circ-(pct/100)*circ;
  const min=Math.floor(urgeTimer/60),sec=String(urgeTimer%60).padStart(2,"0");
  const phase=urgeTimer>225?["衝動の発生","これは生理反応。あなたの意志の問題ではありません。観察しましょう。"]:
              urgeTimer>120?["ピークへ向かう","強くなっていますが、これが最大値です。波を眺めていてください。"]:
              urgeTimer>30 ?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:
                            ["衝動が去っていく","よくやりました。あなたは波に乗り切りました。"];
  const arc=document.getElementById("urge-arc");
  const time=document.getElementById("urge-time");
  const pt=document.getElementById("urge-phase-title");
  const pd=document.getElementById("urge-phase-desc");
  if(arc) arc.setAttribute("stroke-dashoffset",offset);
  if(time) time.textContent=`${min}:${sec}`;
  if(pt) pt.textContent=phase[0];
  if(pd) pd.textContent=phase[1];
  const actions=document.getElementById("urge-actions");
  if(actions) actions.innerHTML=`<div class="row2">
    <button class="btn-red" onclick="logUrge(false)">飲んでしまった</button>
    <button class="btn-cyan" style="padding:13px" onclick="logUrge(true)">✓ 乗り越えた！</button>
  </div>`;
}
function logUrge(resisted) {
  clearInterval(urgeInterval);
  state.urges=[{date:new Date().toISOString(),triggerId:urgeTrigger,resisted},...state.urges].slice(0,200);
  save();
  closeModal();
  renderContent();
}
function stopUrge() {
  clearInterval(urgeInterval);
  closeModal();
}

// ─── BIND EVENTS ────────────────────────────────────────────
function bindEvents() {}

async function setupNotif() {
  if(!("Notification" in window)) { alert("このブラウザは通知非対応です"); return; }
  const perm = await Notification.requestPermission();
  if(perm === "granted") {
    scheduleNotifications();
    const btn = document.getElementById("notif-btn");
    if(btn) { btn.textContent = "✓ ON"; btn.style.color = "var(--green)"; }
    alert("通知をONにしました！\n毎日18:00・19:00・19:15にアラートが届きます");
  } else {
    alert("通知が許可されませんでした。\niPhoneの場合：設定 > Safari > 通知 で許可してください");
  }
}

// ─── NOTIFICATIONS ──────────────────────────────────────────
function requestNotifPermission() {
  if(!("Notification" in window)) return;
  if(Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function scheduleNotifications() {
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();

  // 18:00 の通知
  const t1 = new Date(now); t1.setHours(18,0,0,0);
  const t2 = new Date(now); t2.setHours(19,0,0,0);
  const t3 = new Date(now); t3.setHours(19,15,0,0);

  // 翌朝後悔通知 (8:00)
  const t0 = new Date(now); t0.setHours(8,0,0,0);
  if(t0 <= now) t0.setDate(t0.getDate()+1);

  [
    [t0, "☀️ 昨夜の選択を振り返ろう", "飲んでしまった翌朝：頭痛・だるさ・後悔。今夜また同じにならないために、今日の帰宅ルートを決めておこう"],
    [t1, "⚠️ 魔の時間帯スタート", "今日の帰宅ルート確認。財布は置いてから出発しましょう"],
    [t2, "🌊 誘惑ピーク時間", "飲みたくなったらアプリの「誘惑サーフィン」を開いてください"],
    [t3, "💪 もう少しで安全圏", "19:30を過ぎれば今日の魔の時間帯は終わりです"],
  ].forEach(([time, title, body]) => {
    const delay = time - now;
    if(delay > 0 && delay < 86400000) {
      setTimeout(() => {
        new Notification(title, { body, icon: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🎯</text></svg>') });
      }, delay);
    }
  });
}

// ─── INIT ───────────────────────────────────────────────────
load();
renderContent();
setInterval(checkDangerZone, 60000);
checkDangerZone();
requestNotifPermission();
scheduleNotifications();
setInterval(scheduleNotifications, 3600000); // 1時間ごとに再スケジュール

// Service Worker
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='sober-v1';
    const ASSETS=[self.location.href];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
  `;
  const swBlob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}
</script>
