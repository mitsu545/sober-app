<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="節酒">
<meta name="theme-color" content="#020b18">
<title>節酒トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script>
// PWA Manifest（インライン生成）
(function(){
  const m={name:"ワタベ節酒",short_name:"節酒",start_url:".",display:"standalone",
    background_color:"#020b18",theme_color:"#020b18",orientation:"portrait",
    icons:[{src:"data:image/svg+xml,"+encodeURIComponent(
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'>`+
      `<rect width='192' height='192' rx='40' fill='%23020b18'/>`+
      `<text x='96' y='130' font-size='110' text-anchor='middle'>🐕</text></svg>`
    ),sizes:"192x192",type:"image/svg+xml"}]};
  const l=document.createElement('link');
  l.rel='manifest';
  l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
  document.head.appendChild(l);
})();
</script>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#020b18; --bg2:#0d1b2e; --bg3:#1e293b; --border:#0e2740;
  --cyan:#22d3ee; --green:#34d399; --amber:#f59e0b; --red:#ef4444;
  --text:#f1f5f9; --muted:#64748b; --dim:#475569;
  --dog-tan:#D4956A; --dog-dark:#7A4A2A; --dog-white:#F5DFC0; --dog-nose:#2A1A0A;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'DM Sans',"Hiragino Kaku Gothic ProN",sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);}

/* ── INTERACTION ──────────────────────────────────────────── */
button,.chip{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  transition:opacity .15s,transform .1s;}
button:active,.chip:active{opacity:.7;transform:scale(.97);}
input,textarea{font-family:inherit;outline:none;-webkit-appearance:none;}

/* ── LAYOUT ───────────────────────────────────────────────── */
#danger-banner{background:linear-gradient(90deg,#450a0a,#7f1d1d);padding:10px 16px;
  display:none;align-items:center;gap:8px;font-size:12px;color:#fca5a5;font-weight:600;flex-shrink:0;}
#danger-banner.show{display:flex;animation:slideDown .3s ease;}
#header{padding:calc(var(--safe-top) + 14px) 20px 10px;display:flex;justify-content:space-between;
  align-items:center;border-bottom:1px solid #0a1a2e;flex-shrink:0;}
#header .title{font-size:11px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;font-weight:600;}
#header .sub{font-size:12px;color:var(--muted);margin-top:2px;}
#content{flex:1;overflow-y:auto;padding:16px 20px 90px;-webkit-overflow-scrolling:touch;}
/* FIX: single combined transform prevents nav drift */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateZ(0);
  width:100%;max-width:430px;background:rgba(2,11,24,.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid #0a1a2e;display:grid;grid-template-columns:repeat(4,1fr);
  padding:8px 0 calc(var(--safe-bot)+10px);z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;opacity:.4;transition:opacity .2s;}
.nav-btn.active{opacity:1;}
.nav-btn .nav-icon{font-size:22px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.nav-btn.active .nav-icon{transform:translateY(-2px) scale(1.12);}
.nav-btn .nav-label{font-size:10px;color:var(--muted);font-weight:600;}
.nav-btn.active .nav-label{color:var(--cyan);}

/* ── COMPONENTS ───────────────────────────────────────────── */
.card{background:var(--bg2);border-radius:18px;padding:18px;border:1px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,.2);}
.col{display:flex;flex-direction:column;gap:16px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.label-sm{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.btn-cyan{background:linear-gradient(135deg,#0891b2,#0e7490);border-radius:14px;padding:14px 24px;
  color:white;font-weight:700;font-size:15px;display:block;width:100%;text-align:center;
  box-shadow:0 4px 12px rgba(8,145,178,.3);}
.btn-sm{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);border-radius:10px;
  padding:8px 14px;color:var(--cyan);font-size:12px;font-weight:600;}
.btn-gray{background:var(--bg3);border:1px solid #334155;border-radius:14px;padding:14px;color:var(--text);font-size:14px;font-weight:600;}
.btn-red{background:var(--bg3);border:1px solid #334155;border-radius:14px;padding:14px;color:var(--red);font-size:14px;font-weight:600;}
.inp{width:100%;background:var(--bg3);border:1px solid #334155;border-radius:12px;padding:14px;color:var(--text);font-size:15px;}
.tab-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.section-desc{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:12px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid #334155;
  border-radius:20px;padding:8px 14px;color:var(--muted);font-size:13px;cursor:pointer;
  margin:0 6px 8px 0;font-weight:600;}
.chip.sel{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan);}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px;}
.week-cell-label{font-size:10px;color:var(--muted);text-align:center;margin-bottom:6px;font-weight:600;}
.week-cell{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:13px;border:2px solid transparent;}
.week-cell.sober{background:var(--cyan);color:#020b18;font-weight:700;}
.week-cell.drank{background:var(--red);color:white;font-weight:700;}
.week-cell.today{border-color:var(--cyan);background:rgba(34,211,238,.05);}
.week-cell.empty{background:rgba(30,41,59,.5);}

/* ── MODALS ───────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes dogDeath{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(-15deg) scale(1.05)}100%{transform:rotate(-90deg) scale(.9) translateY(10px)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;
  justify-content:center;z-index:200;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:fadeIn .2s ease-out;}
.sheet{background:#0a1628;border-radius:24px 24px 0 0;padding:24px 24px calc(var(--safe-bot)+24px);
  width:100%;max-width:430px;border-top:1px solid var(--border);max-height:92vh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .35s cubic-bezier(.16,1,.3,1);}
::-webkit-scrollbar{display:none;}

/* ── DOG CARD ─────────────────────────────────────────────── */
.dog-card{border-radius:20px;padding:20px;text-align:center;position:relative;overflow:hidden;transition:all .4s;}
.dog-svg-wrap{display:flex;justify-content:center;align-items:center;margin:8px 0 12px;}
.dog-svg-wrap svg{filter:drop-shadow(0 8px 20px rgba(0,0,0,.4));}
.dog-dead .dog-svg-wrap svg{animation:dogDeath .8s cubic-bezier(.68,-.55,.27,1.55) forwards;}
.dog-meter{display:flex;gap:5px;justify-content:center;margin-top:8px;}
.dog-pip{width:28px;height:6px;border-radius:3px;transition:background .4s;}
.dog-pip.alive{background:var(--green);}
.dog-pip.warned{background:var(--amber);}
.dog-pip.dead{background:#374151;}

/* ── DEATH OVERLAY ────────────────────────────────────────── */
#death-screen{position:fixed;inset:0;background:#000;z-index:500;
  display:none;align-items:center;justify-content:center;flex-direction:column;
  animation:fadeIn .5s ease;}
#death-screen.show{display:flex;}
</style>
</head>
<body>
<div id="app">
  <div id="danger-banner">
    <span style="font-size:16px">⚠️</span>
    <span>魔の時間帯 (18:00–19:30) — 財布を置いてから出発</span>
  </div>
  <div id="header">
    <div>
      <div class="title">WATABE · 節酒記録</div>
      <div class="sub" id="header-sub">目標 週3日以内の飲酒</div>
    </div>
    <button onclick="openModal('setup')"
      style="background:var(--bg3);border:1px solid #334155;border-radius:10px;padding:8px 12px;color:var(--text);font-size:16px;">⚙</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('home')"    id="nav-home">   <span class="nav-icon">🏠</span><span class="nav-label">今日</span></button>
    <button class="nav-btn"        onclick="switchTab('savings')" id="nav-savings"> <span class="nav-icon">💰</span><span class="nav-label">資産</span></button>
    <button class="nav-btn"        onclick="switchTab('tactics')" id="nav-tactics"> <span class="nav-icon">🎯</span><span class="nav-label">作戦</span></button>
    <button class="nav-btn"        onclick="switchTab('history')" id="nav-history"> <span class="nav-icon">📊</span><span class="nav-label">記録</span></button>
  </nav>
</div>
<div id="modal-container"></div>

<!-- 死亡演出スクリーン -->
<div id="death-screen">
  <div id="death-content" style="text-align:center;padding:40px 20px;max-width:320px;"></div>
</div>

<script>
"use strict";
// ─── CONSTANTS ────────────────────────────────────────────────
const WEEKLY_LIMIT = 5;   // これを超えると死亡
const WEEKLY_GOAL  = 3;   // 目標（ここまでに抑えたい）
const RECOVER_DAYS = 2;   // 連続でこの日数飲まないと1段階回復

// 後悔コスト（毎日3つをローテーション）
const REGRET_COSTS = [
  ["🤢","頭痛・だるさで午前中のパフォーマンスが約40%低下（Harvard調査）"],
  ["💸","1回の飲酒コストは酒代+翌日の生産性損失で実質2倍以上"],
  ["😴","深い睡眠が失われ、翌朝の集中力・記憶力が顕著に低下する"],
  ["🧠","前頭前野の働きが最大30%低下し、さらに飲みたくなる悪循環を生む"],
  ["📈","週3日以上の飲酒は肝臓の脂肪蓄積を加速し、肝臓年齢が15歳老ける"],
  ["🫀","飲酒翌日は心拍数が平均8%上昇し、心臓への慢性的な負担を作る"],
  ["💊","アルコールは翌日の気力・やる気を根本から奪う睡眠破壊物質"],
  ["🧬","1回の飲酒で腸内善玉菌が最大24時間ダメージを受ける（腸脳相関）"],
  ["💧","利尿作用で脱水し、翌朝の肌・頭皮・目が劣化する"],
  ["⏰","飲酒後の睡眠は浅く、実質的な休息時間が約30%減少する"],
];

const MILESTONES = [
  {weeks:1, icon:"🌱",label:"1週間",desc:"節酒習慣のスタート"},
  {weeks:2, icon:"💧",label:"2週間",desc:"睡眠の質が改善し始める"},
  {weeks:4, icon:"⚡",label:"1ヶ月",desc:"仕事パフォーマンスが上がる"},
  {weeks:8, icon:"🏔️",label:"2ヶ月",desc:"肝機能が目に見えて改善"},
  {weeks:12,icon:"🌟",label:"3ヶ月",desc:"習慣が完全に書き換わる"},
  {weeks:26,icon:"👑",label:"半年", desc:"人生の質が根本から変わる"},
];

// ─── SVG 柴犬（6ステージ）────────────────────────────────────
// stage 0: 元気いっぱい  stage 1: 普通  stage 2: 疲れ気味
// stage 3: ぐったり  stage 4: 瀕死  stage 5: 死亡
function getDogSVG(stage) {
  const ext   = stage === 5 ? 'jpg' : 'png';
  const w     = stage >= 4 ? 160 : 130;
  const h     = stage >= 4 ? 110 : 130;
  const style = 'object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))';
  return `<img src="dog${stage}.${ext}" width="${w}" height="${h}" style="${style}" alt="柴犬 stage ${stage}">`;
}

// ─── STATE ────────────────────────────────────────────────────
const STATE_KEY = "wb_state_v3";
let state = {
  startDate: null,
  dailyCost: 600,
  log: {},           // { "YYYY-MM-DD": "sober"|"drank" }
  urges: [],         // { date, triggerId, resisted }
  tactics: [],       // { date, situation, plan } - AI生成済み対策
  currentTab: "home",
  historyMonthOffset: 0,
  bestStreak: 0,     // 歴代最高連続クリア日数
  bestWeeks: 0,      // 歴代最高クリア週数
};

// ─── PERF: メモ化 ─────────────────────────────────────────────
let _gwCache = {v:0, h:""};
function goalWeeks() {
  const h = JSON.stringify(state.log);
  if (_gwCache.h === h) return _gwCache.v;
  let c = 0;
  for (let i = 0; i >= -52; i--) {
    const s = weekStats(getWeekDays(i));
    if (s.drank < WEEKLY_LIMIT && (s.sober + s.drank) >= 3) c++;
  }
  _gwCache = {v:c, h};
  return c;
}

// ─── PERSISTENCE（セキュアなlocalStorage操作）─────────────────
function saveState() {
  try {
    // 保存前に最高記録を更新
    const streak = calcStreak();
    if (streak > (state.bestStreak || 0)) state.bestStreak = streak;
    const gw = goalWeeks();
    if (gw > (state.bestWeeks || 0)) state.bestWeeks = gw;

    localStorage.setItem(STATE_KEY, JSON.stringify({
      startDate:   state.startDate ? state.startDate.toISOString() : null,
      dailyCost:   state.dailyCost,
      log:         state.log,
      urges:       state.urges,
      tactics:     state.tactics,
      bestStreak:  state.bestStreak,
      bestWeeks:   state.bestWeeks,
    }));
    _gwCache.h = ""; // キャッシュ無効化
  } catch(e) { console.warn("Save failed:", e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.startDate)  state.startDate  = new Date(d.startDate);
    if (d.dailyCost)  state.dailyCost  = Number(d.dailyCost);
    if (d.log)        state.log        = d.log;
    if (d.urges)      state.urges      = d.urges;
    if (d.tactics)    state.tactics    = d.tactics;
    if (d.bestStreak) state.bestStreak = d.bestStreak;
    if (d.bestWeeks)  state.bestWeeks  = d.bestWeeks;
  } catch(e) { console.warn("Load failed:", e); }
}

function exportData() {
  const raw = localStorage.getItem(STATE_KEY) || "{}";
  const ta  = document.getElementById("backup-text");
  if (ta) ta.value = raw;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(raw)
      .then(() => alert("コピーしました！\niPhoneの「メモ」アプリに貼り付けて保存してください。"))
      .catch(() => { if (ta) ta.select(); alert("テキストエリアの文字を手動でコピーしてください。"); });
  } else {
    if (ta) { ta.select(); try { document.execCommand("copy"); alert("コピーしました！"); } catch(e2) { alert("手動でコピーしてください。"); } }
  }
}

function importData() {
  const ta = document.getElementById("backup-text");
  const raw = ta?.value?.trim();
  if (!raw) { alert("テキストが空です。保存しておいたデータを貼り付けてください。"); return; }
  if (!confirm("現在のデータを上書きします。よろしいですか？")) return;
  try {
    JSON.parse(raw); // バリデーション
    localStorage.setItem(STATE_KEY, raw);
    loadState();
    closeModal();
    renderContent();
    alert("復元しました！");
  } catch(e) { alert("データが壊れています。完全にコピーできているか確認してください。"); }
}

// ─── HELPERS ──────────────────────────────────────────────────
const todayKey = () => new Date().toISOString().slice(0, 10);

function getWeekDays(offset = 0) {
  const days = [], now = new Date(), mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

function weekStats(days) {
  return {
    drank: days.filter(d => state.log[d] === "drank").length,
    sober: days.filter(d => state.log[d] === "sober").length,
  };
}

function totalStats() {
  const sober = Object.values(state.log).filter(v => v === "sober").length;
  return { sober, saved: sober * state.dailyCost };
}

// 連続クリア日数を計算
function calcStreak() {
  let streak = 0, d = new Date();
  const ts = state.log[todayKey()];
  if (!ts) d.setDate(d.getDate() - 1);
  else if (ts === "drank") return 0;
  for (let i = 0; i < 365; i++) {
    const k = d.toISOString().slice(0, 10);
    if (state.log[k] === "sober") { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

// 柴犬ステージを計算（今週の飲酒数 + 回復ボーナス）
function getDogStage() {
  const thisWeekDays = getWeekDays(0);
  const drankCount   = thisWeekDays.filter(d => state.log[d] === "drank").length;
  if (drankCount >= WEEKLY_LIMIT) return 5; // 死亡

  // 回復チェック：直近2日が両方sober → 1段階回復
  const d1 = new Date(); d1.setDate(d1.getDate() - 1);
  const d2 = new Date(); d2.setDate(d2.getDate() - 2);
  const k1 = d1.toISOString().slice(0, 10);
  const k2 = d2.toISOString().slice(0, 10);
  const recovered = (state.log[k1] === "sober" && state.log[k2] === "sober");

  const base = Math.min(4, drankCount);
  return recovered ? Math.max(0, base - 1) : base;
}

// 今週の飲酒数
function getWeekDrinks() {
  return getWeekDays(0).filter(d => state.log[d] === "drank").length;
}

// 回復まで何日か
function getDaysUntilRecovery() {
  const today = todayKey();
  const d1 = new Date(); d1.setDate(d1.getDate() - 1);
  const k1 = d1.toISOString().slice(0, 10);
  if (state.log[today] === "sober" && state.log[k1] === "sober") return 0; // 既に回復中
  if (state.log[today] === "sober") return 1; // あと1日
  return 2; // あと2日
}

function checkDangerZone() {
  const h = new Date().getHours() + new Date().getMinutes() / 60;
  document.getElementById("danger-banner")?.classList.toggle("show", h >= 18 && h < 19.5);
}

// ─── ROUTING ──────────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("nav-" + tab).classList.add("active");
  document.getElementById("content").scrollTop = 0;
  renderContent();
}

function renderContent() {
  const el = document.getElementById("content");
  const map = { home: renderHome, savings: renderSavings, tactics: renderTactics, history: renderHistory };
  el.innerHTML = (map[state.currentTab] || renderHome)();
}

// ─── HOME TAB ─────────────────────────────────────────────────
function renderHome() {
  if (!state.startDate) {
    return `<div style="text-align:center;padding:80px 20px">
      <div style="font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(34,211,238,.3))">🐕</div>
      <h2 style="font-family:'Noto Serif JP',serif;font-size:24px;margin-bottom:16px;line-height:1.5">ワタベさん専用<br>節酒トラッカー</h2>
      <p style="color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:40px">柴犬と一緒に節酒を続けましょう。<br>飲むたびに柴犬が元気をなくします。</p>
      <button class="btn-cyan" onclick="openModal('setup')">今すぐセットアップ →</button>
    </div>`;
  }

  const weekDrinks  = getWeekDrinks();
  const dogStage    = getDogStage();
  const remaining   = WEEKLY_LIMIT - weekDrinks;  // あと何回飲めるか
  const goalRemain  = WEEKLY_GOAL - weekDrinks;    // 目標まであと何回
  const isDead      = dogStage === 5;
  const isWarning   = weekDrinks >= WEEKLY_GOAL;
  const todayLogged = state.log[todayKey()];
  const streak      = calcStreak();
  const {saved, sober: totalSober} = totalStats();
  const thisWeek    = getWeekDays(0);
  const todayIdx    = (new Date().getDay() + 6) % 7;
  const dayNames    = ["月","火","水","木","金","土","日"];
  const hour        = new Date().getHours();
  const isMorning   = hour >= 5 && hour < 12;
  const committed   = localStorage.getItem("wb_commit_" + todayKey()) === "1";
  const dayIdx      = Math.floor(Date.now() / 86400000);
  const daysToRecover = getDaysUntilRecovery();

  // 柴犬カードの色設定
  const dogBg = isDead
    ? "linear-gradient(135deg,#1a0a0a,#0d0505)"
    : dogStage >= 3
      ? "linear-gradient(135deg,#1a0d0a,#120800)"
      : dogStage >= 1
        ? "linear-gradient(135deg,#1a1a0a,#120d00)"
        : "linear-gradient(135deg,#0a1a0a,#061206)";
  const dogBorder = isDead ? "#3D1515" : dogStage >= 3 ? "#3D2010" : dogStage >= 1 ? "#3D3010" : "#1A3D1A";

  // ライフゲージ（5個のドット）
  const dots = Array.from({length: WEEKLY_LIMIT}, (_, i) => {
    const filled = i < (WEEKLY_LIMIT - weekDrinks);
    const cls = filled
      ? (i < WEEKLY_LIMIT - WEEKLY_GOAL ? "alive" : "warned")
      : "dead";
    return `<div class="dog-pip ${cls}"></div>`;
  }).join("");

  // ステージ名
  const stageNames = ["元気いっぱい","普通","疲れ気味","ぐったり","瀕死","💀 今週終了"];
  const stageColors= ["var(--green)","#86d368","var(--amber)","#f97316","var(--red)","#6B7280"];

  const dogCard = `
    <div class="dog-card ${isDead ? "dog-dead" : ""}" style="background:${dogBg};border:1px solid ${dogBorder}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <p class="label-sm" style="margin:0;color:${stageColors[dogStage]}">🐕 柴犬の状態</p>
        <span style="font-size:12px;font-weight:700;color:${stageColors[dogStage]}">${stageNames[dogStage]}</span>
      </div>
      <div class="dog-svg-wrap">${getDogSVG(dogStage)}</div>
      <div class="dog-meter">${dots}</div>
      <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:rgba(0,0,0,.3);border-radius:10px;padding:10px;text-align:center">
          <p style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">今週あと</p>
          <p style="font-size:22px;font-weight:700;color:${remaining<=1?"var(--red)":remaining<=2?"var(--amber)":"var(--cyan)"}">
            ${isDead ? "0" : remaining}<span style="font-size:13px;color:var(--muted)"> 回</span>
          </p>
        </div>
        <div style="background:rgba(0,0,0,.3);border-radius:10px;padding:10px;text-align:center">
          <p style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">回復まで</p>
          <p style="font-size:22px;font-weight:700;color:${daysToRecover===0?"var(--green)":"var(--amber)"}">
            ${daysToRecover===0 ? "回復中" : daysToRecover+"日飲まない"}
          </p>
        </div>
      </div>
      ${isDead ? `<div style="margin-top:14px;background:rgba(239,68,68,.1);border-radius:10px;padding:12px;text-align:center;border:1px solid rgba(239,68,68,.3)">
        <p style="font-size:13px;color:var(--red);font-weight:700">今週の飲酒上限に達しました</p>
        <p style="font-size:12px;color:var(--muted);margin-top:4px">月曜日になると柴犬が復活します</p>
      </div>` : weekDrinks >= WEEKLY_GOAL ? `<div style="margin-top:14px;background:rgba(245,158,11,.08);border-radius:10px;padding:10px;text-align:center">
        <p style="font-size:12px;color:var(--amber);font-weight:600">⚠ 目標の週${WEEKLY_GOAL}回を超えています。あと${remaining}回で柴犬が倒れます。</p>
      </div>` : ""}
    </div>`;

  // 週間カレンダー
  const weekCells = thisWeek.map((d, i) => {
    const s = state.log[d], isToday = i === todayIdx;
    let cls = "week-cell";
    if (s === "sober") cls += " sober"; else if (s === "drank") cls += " drank"; else if (isToday) cls += " today"; else cls += " empty";
    return `<div><div class="week-cell-label" style="color:${isToday?"var(--cyan)":"var(--muted)"}">${dayNames[i]}</div><div class="${cls}">${s==="sober"?"○":s==="drank"?"×":""}</div></div>`;
  }).join("");

  // ストリーク
  const streakCard = streak > 0 ? `
    <div class="card" style="display:flex;align-items:center;gap:16px;border:1px solid rgba(245,158,11,${streak>=7?.6:.3});background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.02))">
      <div style="font-size:44px;line-height:1;filter:drop-shadow(0 0 12px rgba(245,158,11,${streak>=7?.5:.2}))">🔥</div>
      <div style="flex:1">
        <p style="font-size:11px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;font-weight:700;margin-bottom:4px">連続クリア</p>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span style="font-family:'Noto Serif JP',serif;font-size:40px;font-weight:700;color:var(--amber);line-height:1">${streak}</span>
          <span style="font-size:16px;color:var(--dim);font-weight:600">日連続</span>
        </div>
        <p style="font-size:12px;color:var(--muted);margin-top:4px;font-weight:600">${streak>=30?"🏆 1ヶ月超え！":streak>=14?"⚡ 2週間突破！":streak>=7?"🌟 1週間達成！":"この記録を守り続けよう"}</p>
      </div>
    </div>` : "";

  // 今日カード
  const morningCard = (!todayLogged && isMorning && !committed) ? `
    <div class="card" style="border:1px solid rgba(34,211,238,.45);background:linear-gradient(135deg,rgba(34,211,238,.1),rgba(34,211,238,.02))">
      <p style="font-size:11px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;font-weight:700;margin-bottom:10px">☀️ 朝のコミットメント</p>
      <p style="font-size:15px;font-weight:700;margin-bottom:6px">今日、飲まないと宣言しますか？</p>
      <p style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:16px">朝に宣言するだけで夕方の衝動が40%抑制されます（Gollwitzer研究）。</p>
      <button class="btn-cyan" style="padding:14px;font-size:15px" onclick="morningCommit()">✊ 今日は飲まない！と宣言する</button>
    </div>` : "";

  const todayCard = !todayLogged
    ? `<div class="card" style="border:1px solid ${committed?"rgba(245,158,11,.4)":"rgba(34,211,238,.3)"};background:linear-gradient(180deg,var(--bg2),${committed?"rgba(245,158,11,.03)":"rgba(34,211,238,.03)"})">${committed?`<p style="font-size:11px;color:var(--amber);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">✊ 今朝宣言済み — ミッション実行中</p>`:""}<p style="font-size:14px;font-weight:700;color:${committed?"var(--amber)":"var(--cyan)"};margin-bottom:16px;text-align:center">今日のミッションはクリアしましたか？</p><div class="row2"><button class="btn-cyan" style="padding:16px;font-size:16px" onclick="logToday('sober')">✓ 休肝達成</button><button class="btn-red" style="padding:16px;font-size:14px" onclick="openModal('recovery')">飲んでしまった</button></div></div>`
    : `<div class="card" style="text-align:center;position:relative;background:${todayLogged==="sober"?"rgba(34,211,238,.06)":"rgba(239,68,68,.06)"};border:1px solid ${todayLogged==="sober"?"rgba(34,211,238,.3)":"rgba(239,68,68,.3)"}"><button onclick="undoToday()" style="position:absolute;top:14px;right:14px;font-size:12px;font-weight:600;color:var(--muted);background:var(--bg3);padding:6px 12px;border-radius:8px;border:1px solid var(--border)">↩ 取消</button><p style="font-size:32px;margin-bottom:8px;margin-top:8px">${todayLogged==="sober"?"✅":"📝"}</p><p style="color:${todayLogged==="sober"?"var(--cyan)":"var(--red)"};font-weight:700;font-size:16px">${todayLogged==="sober"?"休肝達成！素晴らしい選択です。":"データを記録しました。"}</p>${todayLogged==="drank"?`<p style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6">失敗ではありません。原因が「作戦タブ」に記録されました。<br>明日はまた新しいスタートです。</p>`:""}</div>`;

  // 後悔コスト（毎日3件ローテーション）
  const regretItems = [0,1,2].map(i => REGRET_COSTS[(dayIdx + i) % REGRET_COSTS.length])
    .map(([e,t]) => `<div style="display:flex;gap:12px;margin-bottom:10px;align-items:flex-start"><span style="font-size:16px">${e}</span><p style="font-size:12px;color:#c084fc;line-height:1.6">${t}</p></div>`).join("");

  return `<div class="col">
    ${dogCard}
    <div class="card" style="background:linear-gradient(135deg,#0c1a2e,#091526);border:1px solid #0e3a5c">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <p class="label-sm" style="margin:0">今週の記録</p>
        <span style="font-size:12px;font-weight:700;color:var(--green)">節約累計 ¥${saved.toLocaleString()}</span>
      </div>
      <div class="week-grid">${weekCells}</div>
    </div>
    ${streakCard}
    ${morningCard}
    ${todayCard}
    <button onclick="openModal('urge')" class="card" style="display:flex;align-items:center;gap:16px;width:100%;text-align:left;border:1px solid rgba(34,211,238,.2);background:linear-gradient(90deg,rgba(34,211,238,.04),transparent)">
      <span style="font-size:32px;filter:drop-shadow(0 0 8px rgba(34,211,238,.4))">🌊</span>
      <div><p style="font-weight:700;font-size:15px">飲みたくなったとき（誘惑サーフィン）</p><p style="font-size:12px;color:var(--cyan);margin-top:4px;font-weight:600">5分タイマーで衝動をやり過ごす</p></div>
    </button>
    <div class="card" style="background:#0f0a1e;border:1px solid #1e1040">
      <p style="font-size:11px;letter-spacing:2px;color:#a855f7;text-transform:uppercase;margin-bottom:14px;font-weight:700">💭 翌朝の後悔コスト（毎日入れ替わります）</p>
      ${regretItems}
    </div>
  </div>`;
}

// ─── SAVINGS TAB ──────────────────────────────────────────────
function renderSavings() {
  const {sober, saved} = totalStats();
  const daily   = state.dailyCost;
  const monthly = Math.round(daily * 30 * (7 - WEEKLY_GOAL) / 7);
  const yearly  = Math.round(daily * 365 * (7 - WEEKLY_GOAL) / 7);
  let goals = [];
  try { goals = JSON.parse(localStorage.getItem("wb_saving_goals") || "[]"); } catch(e){}

  const goalCards = goals.map((g, i) => {
    const pct      = Math.min((saved / g.amount) * 100, 100);
    const daysLeft = Math.max(0, Math.ceil((g.amount - saved) / daily));
    return `<div class="card" style="border:1px solid rgba(34,211,238,.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:32px">${g.icon}</span>
          <div><p style="font-weight:700;font-size:15px">${g.name}</p><p style="font-size:11px;color:var(--muted);margin-top:2px">目標 ¥${g.amount.toLocaleString()}</p></div>
        </div>
        <button onclick="removeGoal(${i})" style="font-size:20px;color:var(--dim);padding:4px 8px">×</button>
      </div>
      <div style="background:var(--bg3);border-radius:8px;height:10px;margin-bottom:10px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#22d3ee,#34d399);border-radius:8px;transition:width .8s cubic-bezier(.22,1,.36,1)"></div>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:13px;font-weight:700;color:var(--cyan)">¥${saved.toLocaleString()} <span style="font-size:11px;color:var(--muted);font-weight:400">/ ¥${g.amount.toLocaleString()}</span></span>
        <span style="font-size:12px;font-weight:600;color:var(--muted)">${pct>=100?"🎉 達成！":"あと"+daysLeft+"日"}</span>
      </div>
    </div>`;
  }).join("");

  const ICONS = ["✈️","🍖","📈","🌿","📷","🎮","🏋️","🎁","💻","🛒"];
  const iconSel = localStorage.getItem("wb_icon_sel") || "✈️";
  const iconPicker = ICONS.map(ic => {
    const sel = iconSel === ic;
    return `<span onclick="selectIcon(this,event)" data-ic="${ic}" style="font-size:24px;cursor:pointer;padding:6px;border-radius:10px;background:${sel?"rgba(34,211,238,.2)":"transparent"};border:1px solid ${sel?"var(--cyan)":"transparent"};transition:all .2s">${ic}</span>`;
  }).join("");

  return `<div class="col">
    <h3 class="tab-title">💰 資産（投資原資）</h3>
    <div class="card" style="background:linear-gradient(135deg,#0c1a2e,#091526);border:1px solid #0e3a5c;text-align:center">
      <p class="label-sm">節酒によって生み出した資金</p>
      <p style="font-family:'Noto Serif JP',serif;font-size:52px;font-weight:700;color:var(--green);line-height:1;margin-top:8px">¥${saved.toLocaleString()}</p>
      <div style="background:rgba(255,255,255,.05);padding:8px 16px;border-radius:14px;margin-top:14px;display:inline-block">
        <p style="font-size:13px;color:var(--muted);font-weight:600">休肝 <strong style="color:var(--text)">${sober}</strong>日 × <strong style="color:var(--text)">¥${daily}</strong>/日</p>
      </div>
      <div style="border-top:1px dashed #1e3a5f;margin-top:24px;padding-top:20px">
        <p style="font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:600">週${WEEKLY_GOAL}日以下を継続した場合の節約予測</p>
        <div class="row2">
          <div style="background:var(--bg3);border-radius:12px;padding:14px"><p style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">月間</p><p style="font-size:20px;font-weight:700;color:var(--cyan)">¥${monthly.toLocaleString()}</p></div>
          <div style="background:var(--bg3);border-radius:12px;padding:14px"><p style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">年間</p><p style="font-size:20px;font-weight:700;color:var(--amber)">¥${yearly.toLocaleString()}</p></div>
        </div>
      </div>
    </div>
    ${goals.length > 0 ? goalCards : `<p style="font-size:13px;color:var(--muted);text-align:center;margin:8px 0;font-weight:600">下から目標を追加しましょう</p>`}
    <div class="card" style="border:1px solid rgba(245,158,11,.3)">
      <p style="font-size:14px;font-weight:700;color:var(--amber);margin-bottom:14px">＋ 投資・購入目標を追加</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${iconPicker}</div>
      <input id="goal-name" class="inp" placeholder="目標名（例：NISA・スペアリブ食材）" style="margin-bottom:10px">
      <input id="goal-amount" class="inp" type="number" placeholder="目標金額（円）" style="margin-bottom:14px">
      <button class="btn-cyan" onclick="addGoal()">目標を設定する</button>
    </div>
  </div>`;
}

function selectIcon(el, e) { e.stopPropagation(); localStorage.setItem("wb_icon_sel", el.getAttribute("data-ic")); renderContent(); }
function addGoal() {
  const name = document.getElementById("goal-name")?.value?.trim();
  const amount = Number(document.getElementById("goal-amount")?.value);
  const icon = localStorage.getItem("wb_icon_sel") || "✈️";
  if (!name || !amount) return;
  let goals = []; try { goals = JSON.parse(localStorage.getItem("wb_saving_goals") || "[]"); } catch(e){}
  goals.push({name, amount, icon});
  localStorage.setItem("wb_saving_goals", JSON.stringify(goals));
  renderContent();
}
function removeGoal(idx) {
  let goals = []; try { goals = JSON.parse(localStorage.getItem("wb_saving_goals") || "[]"); } catch(e){}
  goals.splice(idx, 1); localStorage.setItem("wb_saving_goals", JSON.stringify(goals)); renderContent();
}

// ─── TACTICS TAB（AI生成対策一覧）────────────────────────────
function renderTactics() {

      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <p style="font-size:11px;color:var(--muted);font-weight:600">${new Date(t.date).toLocaleDateString("ja-JP")}</p>

        <p style="font-size:11px;color:var(--red);font-weight:700;margin-bottom:4px">📌 状況・理由</p>
        <p style="font-size:13px;color:var(--text);line-height:1.6">${t.situation || "（入力なし）"}</p>
      </div>
      <div style="background:rgba(34,211,238,.08);border-radius:10px;padding:10px;border:1px solid rgba(34,211,238,.2)">
        <p style="font-size:11px;color:var(--cyan);font-weight:700;margin-bottom:4px">🛡️ AI生成対策</p>

    <p style="font-weight:700;font-size:16px;margin-bottom:8px">まだ作戦がありません</p>
    <p style="font-size:13px;color:var(--muted);line-height:1.7">「飲んでしまった」を押した後に状況を入力すると、<br>Claudeがあなた専用の防衛策を自動生成します。<br>失敗が作戦に変わります。</p>
  </div>`;

  return `<div class="col">
    <h3 class="tab-title">🎯 AI作戦 — 失敗から学ぶ</h3>
    <p class="section-desc">飲んでしまった時の状況をAIが分析し、次回の具体的なif-then対策を自動生成します。失敗するたびに作戦が強くなります。</p>
    ${cards}
  </div>`;
}
function removeTactic(idx) {
  state.tactics.splice(idx, 1); saveState(); renderContent();
}

// ─── HISTORY TAB ──────────────────────────────────────────────
function changeMonth(delta) {
  state.historyMonthOffset = Math.max(0, Math.min(24, (state.historyMonthOffset || 0) + delta));
  renderContent();
}
function toggleHistoryLog(dateStr) {
  const cur = state.log[dateStr];
  if (!cur) state.log[dateStr] = "sober";
  else if (cur === "sober") state.log[dateStr] = "drank";
  else delete state.log[dateStr];
  saveState(); renderContent();
}

function renderHistory() {
  const {sober, saved} = totalStats();
  const gw = goalWeeks();
  const dayNames = ["月","火","水","木","金","土","日"];
  const summaryCards = [
    ["累計クリア", sober+"日",              "var(--cyan)"],
    ["確保した資金","¥"+saved.toLocaleString(),"var(--green)"],
    ["最高連続記録",(state.bestStreak||0)+"日","var(--amber)"],
  ].map(([l,v,c]) => `<div class="card" style="text-align:center;padding:16px"><p style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">${l}</p><p style="font-size:22px;font-weight:700;color:${c}">${v}</p></div>`).join("");

  const mo = state.historyMonthOffset || 0;
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth() - mo, 1);
  const yr = target.getFullYear(), mn = target.getMonth();
  const label = yr + "年" + (mn+1) + "月";
  const dim = new Date(yr, mn+1, 0).getDate();
  const fdow = (new Date(yr, mn, 1).getDay() + 6) % 7;
  let mS = 0, mD = 0;
  for (let d = 1; d <= dim; d++) {
    const k = yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    if (state.log[k]==="sober") mS++; else if (state.log[k]==="drank") mD++;
  }
  let cells = "";
  for (let i = 0; i < fdow; i++) cells += "<div></div>";
  for (let d = 1; d <= dim; d++) {
    const k = yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const s = state.log[k], isToday = k === todayKey();
    const bg = s==="sober"?"var(--cyan)":s==="drank"?"var(--red)":isToday?"rgba(34,211,238,.15)":"rgba(30,41,59,.5)";
    cells += `<div onclick="toggleHistoryLog('${k}')" class="week-cell" style="cursor:pointer;background:${bg};border:${isToday?"2px solid var(--cyan)":"2px solid transparent"};color:${s?"white":"var(--text)"};">${d}</div>`;
  }

        <button onclick="changeMonth(-1)" style="padding:10px;background:var(--bg3);border-radius:10px;font-size:16px;color:${mo<=0?"transparent":"var(--text)"};pointer-events:${mo<=0?"none":"auto"}">▶</button>

let _generatedPlan = "";

// ローカル対策生成（APIが使えない環境用）
// 入力した状況のキーワードを読んで関連する if-then 対策を返す
function generateLocalTactic(situation) {
  const s = situation || "";
  // キーワードマッチングで状況に合った対策を返す
  if (/LINE|迎え|妻|嫁/.test(s))
    return "もし妻からLINEで迎えの依頼が来たら → 「今から行くね」とだけ返信し、財布をテーブルに置いてから出発する";
  if (/コンビニ|帰り|駅|ついで/.test(s))
    return "もし帰り道にコンビニや酒屋の前を通ったら → イヤホンをつけてポッドキャストを再生し、目的なく入店しない";
  if (/疲れ|ストレス|仕事|残業/.test(s))
    return "もし仕事で疲れて帰宅した時は → 帰宅前に5分だけ駅周辺を歩き、コルチゾールを消費してから帰宅する";
  if (/家|ある|ストック|買って/.test(s))
    return "もし家にお酒のストックがある時は → 今すぐ見えない場所（押し入れや高い棚）に移動させ、視界から消す";
  if (/休日|昼|暇|時間/.test(s))
    return "もし休日で時間を持て余した時は → 14時にノンアルドリンクを作り、飲む側ではなく「作る側」のモードに切り替える";
  if (/誘われ|飲み会|付き合い|友人|同僚/.test(s))
    return "もし飲み会に誘われた時は → 「今日は車で来てる」または「薬を飲んでいる」と事前に一言伝え、飲まない理由を準備しておく";
  if (/動画|コンテンツ|YouTube|SNS/.test(s))
    return "もし酒に関連する動画やコンテンツを見たくなったら → すぐにスペアリブや料理系の動画に切り替え、作る側のモードに入る";
  // 状況が未入力またはマッチしない場合
  if (!s || s.length < 5)
    return "もし今夜飲みたくなったら → アプリの「誘惑サーフィン」を開き5分タイマーを起動する。衝動は5〜10分で必ず消える（ACT理論）";
  // 状況テキストをそのままif節に使う
  return `もし「${s.slice(0,20)}」という状況になったら → その場でアプリを開き誘惑サーフィンタイマーを5分起動する。衝動が去るまで別の行動（水を飲む・外に出る）で時間を稼ぐ`;
}
async function generateAITactic() {
  const situation = document.getElementById("rec-situation")?.value?.trim() || "";
  const loading   = document.getElementById("ai-loading");
  const result    = document.getElementById("ai-result");
  const planText  = document.getElementById("ai-plan-text");
  const genBtn    = document.getElementById("ai-gen-btn");
  const saveBtn   = document.getElementById("save-recovery-btn");

  loading.style.display = "block";
  genBtn.style.display  = "none";
  result.style.display  = "none";

  const prompt = "断酒・節酒中のユーザー（32歳男性、東京世田谷区在住、データアナリスト）が今日飲んでしまいました。"
    + "状況：" + (situation || "不明")
    + "。主なトリガー傾向：妻のLINE迎え依頼・最寄り駅でのついで買い・仕事のストレス・休日の酒コンテンツ閲覧。"
    + "行動科学の観点から、「もし【状況】なら→【具体的な行動】」の形式で、"
    + "この人に最も刺さる具体的な対策を1つだけ生成してください。"
    + "40〜60文字、日本語、実行可能な行動レベルで。余計な説明は不要。";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 200,
        messages: [{role: "user", content: prompt}]
      })
    });
    const data = await res.json();
    _generatedPlan = data.content?.find(b => b.type === "text")?.text?.trim() || "";
    if (!_generatedPlan) throw new Error("empty response");
  } catch(e) {
    // API失敗時：入力した状況テキストを読んで関連する対策を返す
    _generatedPlan = generateLocalTactic(situation);
  }

  loading.style.display = "none";
  planText.textContent   = _generatedPlan;
  result.style.display   = "block";
  saveBtn.style.display  = "block";
}

function saveRecovery() {
  const situation = document.getElementById("rec-situation")?.value?.trim() || "";
  if (_generatedPlan) {
    state.tactics = state.tactics || [];
    state.tactics.push({ date: new Date().toISOString(), situation, plan: _generatedPlan });
  }
  logToday("drank");
  _generatedPlan = "";
  closeModal();
}

function skipRecovery() {
  logToday("drank");
  closeModal();
}

// Urge Surfing Modal
let urgeTimer=300, urgeRunning=false, urgeTrigger="", urgeInterval=null;
const URGE_TRIGGERS = [
  {id:"wife_line",icon:"📱",label:"妻のLINE（迎え）",  plan:"「今から行くね」とだけ返信し、財布を置いてから出発する"},
  {id:"station",  icon:"🚃",label:"最寄り駅に着いた",  plan:"イヤホン装着→ポッドキャスト再生。食材はネットスーパーで帰宅後注文"},
  {id:"konbini",  icon:"🏪",label:"コンビニの前",       plan:"目的がなければ入らない。代わりに自販機で炭酸水"},
  {id:"content",  icon:"📺",label:"酒コンテンツを見た", plan:"すぐ料理動画（スペアリブ）に切り替え。作る側のモードへ"},
  {id:"stress",   icon:"😤",label:"仕事のストレス",     plan:"帰宅前に5分ウォーキング。コルチゾールを消費する"},
  {id:"holiday",  icon:"🏠",label:"休日の昼〜夕方",    plan:"14時にノンアルドリンクを作る習慣を先に入れる"},
];

function renderUrgeModal() {
  const R=54, circ=2*Math.PI*R, offset=circ-(((300-urgeTimer)/300)*circ);
  const phase = urgeTimer>225 ? ["衝動の発生","これは生理的な波です。意志の弱さではありません。ただ観察しましょう。"] :
                urgeTimer>120 ? ["ピークへ向かう","波が高くなっていますが、これが最大値です。やり過ごせます。"] :
                urgeTimer>30  ? ["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"] :
                                ["衝動が去っていく","よくやりました。あなたは波を乗りこなしました。"];
  const min=Math.floor(urgeTimer/60), sec=String(urgeTimer%60).padStart(2,"0");
  const chips = URGE_TRIGGERS.map(t =>
    `<span class="chip${urgeTrigger===t.id?" sel":""}" onclick="setUrgeTrigger('${t.id}')">${t.icon} ${t.label}</span>`
  ).join("");
  const planBox = urgeTrigger
    ? `<div style="background:rgba(245,158,11,.1);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid rgba(245,158,11,.3)"><p style="font-size:12px;color:var(--amber);margin-bottom:6px;font-weight:700">📌 今すぐ実行すること</p><p style="font-size:15px;color:var(--text);line-height:1.6;font-weight:700">${URGE_TRIGGERS.find(t=>t.id===urgeTrigger)?.plan}</p></div>` : "";
  const actions = (!urgeRunning && urgeTimer===300)
    ? `<button class="btn-cyan" style="padding:16px;font-size:16px" onclick="startUrgeTimer()">タイマーを開始する</button>`
    : `<div class="row2"><button class="btn-red" onclick="closeModal();openModal('recovery')">飲んでしまった</button><button class="btn-cyan" style="padding:16px" onclick="logUrgeWin()">✓ 乗り越えた！</button></div>`;

  return `<div class="overlay">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px">
        <h3 style="font-size:18px;font-weight:700">🌊 誘惑サーフィン</h3>
        <button onclick="stopUrge()" style="font-size:24px;color:var(--muted);padding:4px">×</button>
      </div>
      <div style="background:rgba(30,41,59,.5);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--text);line-height:1.7;font-weight:600">
        飲みたい衝動は<span style="color:var(--cyan)">5〜10分で必ず自然に消えます</span>（ACT理論）。抵抗せず、ただ波を観察してください。
      </div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600">今のトリガーは？</p>
      <div style="margin-bottom:20px">${chips}</div>
      ${planBox}
      <div style="text-align:center;margin-bottom:24px">
        <svg width="140" height="140" viewBox="0 0 130 130" style="transform:rotate(-90deg)">
          <circle cx="65" cy="65" r="${R}" fill="none" stroke="var(--bg3)" stroke-width="10"/>
          <circle id="urge-arc" cx="65" cy="65" r="${R}" fill="none" stroke="var(--cyan)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div style="margin-top:-104px;position:relative">
          <p id="urge-time" style="font-family:'Noto Serif JP',serif;font-size:46px;font-weight:700;letter-spacing:-2px">${min}:${sec}</p>
        </div>
        <p id="urge-phase-title" style="color:var(--cyan);font-weight:700;margin-top:52px;font-size:16px">${phase[0]}</p>
        <p id="urge-phase-desc" style="color:var(--muted);font-size:13px;margin-top:6px;line-height:1.6;font-weight:600">${phase[1]}</p>
      </div>
      <div id="urge-actions">${actions}</div>
    </div>
  </div>`;
}
function setUrgeTrigger(id) { urgeTrigger=id; document.getElementById("modal-container").innerHTML=renderUrgeModal(); if(urgeRunning) startUrgeTimer(); }
function startUrgeTimer() {
  urgeRunning=true; clearInterval(urgeInterval);
  urgeInterval = setInterval(() => {
    if (urgeTimer<=0){clearInterval(urgeInterval); urgeRunning=false;}
    else urgeTimer--;
    _updateUrgeDisplay();
  }, 1000);
  _updateUrgeDisplay();
}
function _updateUrgeDisplay() {
  const R=54, circ=2*Math.PI*R, offset=circ-(((300-urgeTimer)/300)*circ);
  const min=Math.floor(urgeTimer/60), sec=String(urgeTimer%60).padStart(2,"0");
  const phase = urgeTimer>225?["衝動の発生","これは生理的な波です。意志の弱さではありません。ただ観察しましょう。"]:urgeTimer>120?["ピークへ向かう","波が高くなっていますが、これが最大値です。やり過ごせます。"]:urgeTimer>30?["ピーク通過中","波は必ず引きます。もうほとんど過ぎています。"]:["衝動が去っていく","よくやりました。あなたは波を乗りこなしました。"];
  const g = id => document.getElementById(id);
  const arc = g("urge-arc"); if(arc) arc.setAttribute("stroke-dashoffset", offset);
  if(g("urge-time")) g("urge-time").textContent = `${min}:${sec}`;
  if(g("urge-phase-title")) g("urge-phase-title").textContent = phase[0];
  if(g("urge-phase-desc"))  g("urge-phase-desc").textContent  = phase[1];
  if (!urgeRunning && urgeTimer<=0) {
    const a = g("urge-actions");
    if(a) a.innerHTML = `<div class="row2"><button class="btn-red" onclick="closeModal();openModal('recovery')">飲んでしまった</button><button class="btn-cyan" style="padding:16px" onclick="logUrgeWin()">✓ 乗り越えた！</button></div>`;
  }
}
function logUrgeWin() { clearInterval(urgeInterval); closeModal(); }
function stopUrge()    { clearInterval(urgeInterval); closeModal(); }

// ─── SWIPE: カレンダー月移動 ──────────────────────────────────
let _swipeX = null;
document.addEventListener("touchstart", e => { if(state.currentTab==="history") _swipeX=e.touches[0].clientX; }, {passive:true});
document.addEventListener("touchend",   e => {
  if(state.currentTab!=="history"||_swipeX===null) return;

// ─── VISIBILITY REFRESH（節電：1分以上離席した場合のみ）────────
let _lastVis = Date.now();
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState==="visible") {
    const now=Date.now();
    if(now-_lastVis>60000){ renderContent(); checkDangerZone(); }
    _lastVis=now;
  }
});

// ─── CSS SPINNER ──────────────────────────────────────────────
const _style = document.createElement("style");
_style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(_style);

// ─── INIT ─────────────────────────────────────────────────────
loadState();
renderContent();
checkDangerZone();
setInterval(checkDangerZone, 60000);

// Service Worker（オフライン対応）
if ("serviceWorker" in navigator) {
  const sw = `const C='sober-v8',A=[self.location.href];`
    + `self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)))});`
    + `self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))))});`
    + `self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
  navigator.serviceWorker
    .register(URL.createObjectURL(new Blob([sw], {type:"text/javascript"})))
    .catch(() => {});
}
</script>
</body>
</html>
